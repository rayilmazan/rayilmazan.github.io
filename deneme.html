<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siber Bluetooth Radarı</title>
    <style>
        :root {
            --neon-green: #00ff66;
            --neon-red: #ff3333;
            --neon-blue: #00ffff;
            --dark-bg: #0a0f0d;
            --panel-bg: #111a16;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 15px;
            width: 100%;
            border-bottom: 1px solid rgba(0, 255, 102, 0.2);
        }

        h1 {
            margin: 0;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon-green);
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 500px;
            padding: 15px;
            box-sizing: border-box;
            gap: 15px;
        }

        .radar-screen {
            position: relative;
            width: 280px;
            height: 280px;
            border: 2px solid var(--neon-green);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,255,102,0.03) 0%, rgba(0,0,0,0.9) 100%);
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.15);
            overflow: hidden;
        }

        canvas#radar-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .details-card {
            width: 100%;
            background-color: var(--panel-bg);
            border: 1px solid rgba(0, 255, 102, 0.2);
            border-radius: 6px;
            padding: 10px 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .details-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            opacity: 0.7;
            border-bottom: 1px dashed rgba(0, 255, 102, 0.2);
            padding-bottom: 3px;
            margin-bottom: 3px;
        }

        .details-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }

        .graph-container {
            width: 100%;
            height: 100px;
            background-color: var(--panel-bg);
            border: 1px solid rgba(0, 255, 102, 0.2);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }

        canvas#graph-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .control-panel {
            width: 100%;
            background-color: var(--panel-bg);
            border: 1px solid rgba(0, 255, 102, 0.15);
            border-radius: 8px;
            padding: 12px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            background-color: transparent;
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            padding: 12px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 4px;
            transition: all 0.2s;
            text-shadow: 0 0 5px rgba(0, 255, 102, 0.5);
            box-shadow: inset 0 0 10px rgba(0, 255, 102, 0.1);
        }

        .btn:hover {
            background-color: var(--neon-green);
            color: var(--dark-bg);
            box-shadow: 0 0 20px var(--neon-green);
        }

        .device-list {
            font-size: 0.8rem;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 120px;
            overflow-y: auto;
            background: rgba(0, 255, 102, 0.02);
            padding: 8px;
            border-radius: 4px;
            border: 1px solid rgba(0, 255, 102, 0.1);
        }

        .device-row {
            display: flex;
            justify-content: space-between;
            padding: 6px;
            cursor: pointer;
            border-radius: 3px;
            transition: background 0.2s;
            border-bottom: 1px solid rgba(0, 255, 102, 0.05);
        }

        .device-row:hover {
            background: rgba(0, 255, 102, 0.1);
        }

        .device-row.selected {
            background: rgba(0, 255, 102, 0.15);
            border-left: 3px solid var(--neon-blue);
            color: var(--neon-blue);
        }

        .device-type-real {
            color: var(--neon-blue);
            font-weight: bold;
        }

        .device-type-sim {
            color: rgba(0, 255, 102, 0.5);
        }

        .status-message {
            font-size: 0.8rem;
            text-align: center;
            color: #888;
        }

        .device-list::-webkit-scrollbar {
            width: 4px;
        }
        .device-list::-webkit-scrollbar-thumb {
            background: var(--neon-green);
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <header>
        <h1>BLUE-RADAR SCANNER</h1>
        <div class="status-message" id="status-text">Web Bluetooth Sistemi Aktif. Aramayı Başlatın.</div>
    </header>

    <div class="main-container">
        <div class="radar-screen">
            <canvas id="radar-canvas"></canvas>
        </div>

        <div class="details-card">
            <div class="details-title">Hedef Sinyal Analizi</div>
            <div class="details-row"><span>Cihaz Adı:</span><span id="det-name" style="color: var(--neon-blue);">Seçim Yok</span></div>
            <div class="details-row"><span>Cihaz Tipi:</span><span id="det-type">--</span></div>
            <div class="details-row"><span>Sinyal Gücü (RSSI):</span><span id="det-rssi">-- dBm</span></div>
            <div class="details-row"><span>Bağlantı Durumu:</span><span id="det-status">--</span></div>
        </div>

        <div class="graph-container">
            <canvas id="graph-canvas"></canvas>
        </div>

        <div class="control-panel">
            <button class="btn" id="scan-btn">⚡ Bluetooth Cihazı Ara</button>
            <div class="device-list" id="device-list-container"></div>
        </div>
    </div>

        <script>
        const radarCanvas = document.getElementById('radar-canvas');
        const radarCtx = radarCanvas.getContext('2d');
        const graphCanvas = document.getElementById('graph-canvas');
        const graphCtx = graphCanvas.getContext('2d');

        function initCanvases() {
            radarCanvas.width = radarCanvas.parentElement.clientWidth;
            radarCanvas.height = radarCanvas.parentElement.clientHeight;
            graphCanvas.width = graphCanvas.parentElement.clientWidth;
            graphCanvas.height = graphCanvas.parentElement.clientHeight;
        }
        initCanvases();

        const activeDevices = [
            { id: "sim-1", name: "Bilinmeyen BLE Beacon", rssi: -82, type: "Simüle", angle: 60, blipAlpha: 0, history: Array(50).fill(-82) },
            { id: "sim-2", name: "Smart TV v4.2", rssi: -65, type: "Simüle", angle: 160, blipAlpha: 0, history: Array(50).fill(-65) },
            { id: "sim-3", name: "Akıllı Saat (M6)", rssi: -45, type: "Simüle", angle: 280, blipAlpha: 0, history: Array(50).fill(-45) }
        ];

        let sweepAngle = 0;
        let selectedDeviceId = "sim-3";
        let lastUpdateTime = 0;

        const scanBtn = document.getElementById('scan-btn');
        const statusText = document.getElementById('status-text');
        const deviceListContainer = document.getElementById('device-list-container');
        
        const detName = document.getElementById('det-name');
        const detType = document.getElementById('det-type');
        const detRssi = document.getElementById('det-rssi');
        const detStatus = document.getElementById('det-status');

        let audioCtx = null;
        function playSonarBeep(frequency, volume) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();

                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
                
                gain.gain.setValueAtTime(volume * 0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);

                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.25);
            } catch (e) {}
        }

        function renderDeviceList() {
            deviceListContainer.innerHTML = '';
            activeDevices.forEach(dev => {
                const row = document.createElement('div');
                row.className = `device-row ${dev.id === selectedDeviceId ? 'selected' : ''}`;
                
                const isReal = dev.type === "Gerçek Cihaz";
                const typeBadge = isReal ? `<span class="device-type-real">[GERÇEK]</span>` : `<span class="device-type-sim">[MOCK]</span>`;

                row.innerHTML = `
                    <span>📡 ${dev.name} ${typeBadge}</span>
                    <span>${dev.rssi} dBm</span>
                `;
                row.addEventListener('click', () => {
                    selectedDeviceId = dev.id;
                    renderDeviceList();
                    updateDetailCard();
                });
                deviceListContainer.appendChild(row);
            });
        }

        function updateDetailCard() {
            const dev = activeDevices.find(d => d.id === selectedDeviceId);
            if (dev) {
                detName.textContent = dev.name;
                detType.textContent = dev.type;
                detRssi.textContent = `${dev.rssi} dBm`;
                detStatus.textContent = dev.type === "Gerçek Cihaz" ? "Eşleştirildi / Canlı" : "Sinyal Dinleniyor";

                if (dev.rssi >= -60) detRssi.style.color = "var(--neon-green)";
                else if (dev.rssi >= -80) detRssi.style.color = "var(--neon-blue)";
                else detRssi.style.color = "var(--neon-red)";
            }
        }

        scanBtn.addEventListener('click', async () => {
            if (!navigator.bluetooth) {
                alert("Tarayıcınız Web Bluetooth API'sini destekmiyor. Lütfen HTTPS protokolü kullanan Chrome, Edge veya Opera tarayıcısı ile deneyin.");
                statusText.textContent = "Hata: Tarayıcı Bluetooth desteği sunmuyor.";
                statusText.style.color = "var(--neon-red)";
                return;
            }

            statusText.textContent = "Bluetooth penceresi açılıyor... Cihaz seçin.";
            statusText.style.color = "var(--neon-blue)";

            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true
                });

                statusText.textContent = `Yeni cihaz bağlandı: ${device.name || "İsimsiz Cihaz"}`;
                statusText.style.color = "var(--neon-green)";

                const exists = activeDevices.find(d => d.id === device.id);
                if (!exists) {
                    const newDevice = {
                        id: device.id,
                        name: device.name || "İsimsiz BLE Cihazı",
                        rssi: -50,
                        type: "Gerçek Cihaz",
                        angle: Math.floor(Math.random() * 360),
                        blipAlpha: 0,
                        history: Array(50).fill(-50)
                    };
                    activeDevices.push(newDevice);
                    selectedDeviceId = newDevice.id;
                    renderDeviceList();
                    updateDetailCard();
                }

            } catch (error) {
                console.log(error);
                statusText.textContent = "Tarama iptal edildi veya cihaz bulunamadı.";
                statusText.style.color = "#888";
            }
        });

                    function updateSignals() {
            activeDevices.forEach(dev => {
                const fluctuation = Math.round((Math.random() - 0.5) * 4);
                let newRssi = dev.rssi + fluctuation;
                newRssi = Math.max(-95, Math.min(-35, newRssi));
                dev.rssi = newRssi;

                dev.history.push(newRssi);
                dev.history.shift();
            });
            renderDeviceList();
            updateDetailCard();
        }

        function animate() {
            sweepAngle = (sweepAngle + 1.5) % 360;

            activeDevices.forEach(dev => {
                if (Math.abs(sweepAngle - dev.angle) < 1.5) {
                    dev.blipAlpha = 1.0;
                    const frequency = 400 + (Math.abs(dev.rssi) * -3);
                    playSonarBeep(frequency, (100 - Math.abs(dev.rssi)) / 100);
                }
            });

            const now = performance.now();
            if (now - lastUpdateTime > 800) {
                updateSignals();
                lastUpdateTime = now;
            }

            drawRadar();
            drawGraph();

            requestAnimationFrame(animate);
        }

        function drawRadar() {
            const w = radarCanvas.width;
            const h = radarCanvas.height;
            const cx = w / 2;
            const cy = h / 2;
            const maxRadius = Math.min(w, h) / 2 - 10;

            radarCtx.clearRect(0, 0, w, h);

            radarCtx.strokeStyle = 'rgba(0, 255, 102, 0.12)';
            radarCtx.lineWidth = 1;
            const rssiLabels = ["-35 dBm (Çok Yakın)", "-55 dBm", "-75 dBm", "-95 dBm (Uzak)"];
            let idx = 0;
            for (let r = maxRadius; r > 0; r -= maxRadius / 4) {
                radarCtx.beginPath();
                radarCtx.arc(cx, cy, r, 0, Math.PI * 2);
                radarCtx.stroke();
                
                radarCtx.fillStyle = 'rgba(0, 255, 102, 0.3)';
                radarCtx.font = '7px monospace';
                radarCtx.fillText(rssiLabels[idx++], cx + 5, cy - r + 10);
            }

            radarCtx.strokeStyle = 'rgba(0, 255, 102, 0.08)';
            radarCtx.beginPath();
            radarCtx.moveTo(cx - maxRadius, cy); radarCtx.lineTo(cx + maxRadius, cy);
            radarCtx.moveTo(cx, cy - maxRadius); radarCtx.lineTo(cx, cy + maxRadius);
            radarCtx.stroke();

            const radAngle = (sweepAngle * Math.PI) / 180;
            const sweepX = cx + maxRadius * Math.cos(radAngle);
            const sweepY = cy + maxRadius * Math.sin(radAngle);

            const sweepGrad = radarCtx.createLinearGradient(cx, cy, sweepX, sweepY);
            sweepGrad.addColorStop(0, 'rgba(0, 255, 102, 0.25)');
            sweepGrad.addColorStop(1, 'rgba(0, 255, 102, 0)');
            
            radarCtx.fillStyle = sweepGrad;
            radarCtx.beginPath();
            radarCtx.moveTo(cx, cy);
            radarCtx.arc(cx, cy, maxRadius, radAngle, radAngle - 0.3 * Math.PI, true);
            radarCtx.closePath();
            radarCtx.fill();

            radarCtx.strokeStyle = 'rgba(0, 255, 102, 0.7)';
            radarCtx.lineWidth = 1.2;
            radarCtx.beginPath();
            radarCtx.moveTo(cx, cy);
            radarCtx.lineTo(sweepX, sweepY);
            radarCtx.stroke();

            activeDevices.forEach(dev => {
                const angleRad = (dev.angle * Math.PI) / 180;
                const distanceRatio = (Math.abs(dev.rssi) - 35) / (100 - 35);
                const r = Math.max(15, distanceRatio * maxRadius);

                const blipX = cx + r * Math.cos(angleRad);
                const blipY = cy + r * Math.sin(angleRad);

                if (dev.blipAlpha > 0) {
                    dev.blipAlpha -= 0.008;
                }

                let colorString = `rgba(0, 255, 102, ${Math.max(dev.blipAlpha, 0.2)})`;
                if (dev.id === selectedDeviceId) {
                    colorString = `rgba(0, 255, 255, ${Math.max(dev.blipAlpha, 0.5)})`;
                } else if (dev.type === "Gerçek Cihaz") {
                    colorString = `rgba(0, 210, 255, ${Math.max(dev.blipAlpha, 0.3)})`;
                }

                radarCtx.fillStyle = colorString;
                radarCtx.beginPath();
                radarCtx.arc(blipX, blipY, 15 * dev.blipAlpha, 0, Math.PI * 2);
                radarCtx.fill();

                radarCtx.beginPath();
                radarCtx.arc(blipX, blipY, 5, 0, Math.PI * 2);
                radarCtx.fill();

                radarCtx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                radarCtx.font = '8px monospace';
                radarCtx.fillText(dev.name.substring(0, 12), blipX + 8, blipY + 3);
            });
        }

        function drawGraph() {
            graphCtx.clearRect(0, 0, graphCanvas.width, graphCanvas.height);

            graphCtx.strokeStyle = 'rgba(0, 255, 102, 0.05)';
            graphCtx.lineWidth = 1;
            for (let i = 0; i < graphCanvas.width; i += 40) {
                graphCtx.beginPath();
                graphCtx.moveTo(i, 0); graphCtx.lineTo(i, graphCanvas.height);
                graphCtx.stroke();
            }

            const activeDev = activeDevices.find(d => d.id === selectedDeviceId);
            if (!activeDev || activeDev.history.length < 2) return;

            graphCtx.strokeStyle = activeDev.id.startsWith('sim') ? 'var(--neon-green)' : 'var(--neon-blue)';
            graphCtx.lineWidth = 2;
            graphCtx.beginPath();

            const step = graphCanvas.width / (activeDev.history.length - 1);
            for (let i = 0; i < activeDev.history.length; i++) {
                const val = activeDev.history[i];
                const ratio = (Math.abs(val) - 35) / 65;
                const y = 15 + ratio * (graphCanvas.height - 30);
                const x = i * step;

                if (i === 0) {
                    graphCtx.moveTo(x, y);
                } else {
                    graphCtx.lineTo(x, y);
                }
            }
            graphCtx.stroke();

            graphCtx.fillStyle = 'rgba(0, 255, 102, 0.7)';
            graphCtx.font = '9px monospace';
            graphCtx.fillText(`TAKİPTEKİ SİNYAL: ${activeDev.name}`, 10, 15);
        }

        renderDeviceList();
        updateDetailCard();
        animate();
    </script>
</body>
</html>
