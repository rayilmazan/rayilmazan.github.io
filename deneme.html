<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akıllı Renk Dedektörü</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 10px 0;
            letter-spacing: 1px;
            color: #eee;
        }

        #container {
            position: relative;
            width: 90vw;
            max-width: 450px;
            aspect-ratio: 1/1;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 3px solid #333;
        }

        video {
            display: none; /* Arka planda işleyeceğiz */
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Ekranın ortasındaki hedef dairesi */
        .target-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 3;
        }

        /* Renk Bilgi Kartı */
        .color-card {
            width: 90vw;
            max-width: 450px;
            background: #1e1e1e;
            margin-top: 15px;
            border-radius: 16px;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid #333;
        }

        .color-preview {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            border: 2px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: background-color 0.1s ease;
        }

        .color-details {
            flex: 1;
        }

        .color-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .color-code {
            font-family: monospace;
            font-size: 0.9rem;
            color: #aaa;
        }

        button {
            width: 90vw;
            max-width: 450px;
            margin-top: 15px;
            background: #007aff;
            border: none;
            color: #fff;
            padding: 15px;
            cursor: pointer;
            font-weight: 600;
            border-radius: 12px;
            font-size: 1rem;
            transition: background 0.2s;
        }

        button:active {
            background: #0056b3;
        }
    </style>
</head>
<body>

    <h1>AKILLI RENK DEDEKTÖRÜ</h1>
    
    <div id="container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="cameraCanvas"></canvas>
        <div class="target-ring"></div>
    </div>

    <div class="color-card">
        <div class="color-preview" id="colorPreview" style="background-color: #333;"></div>
        <div class="color-details">
            <div class="color-name" id="colorName">Siyah / Koyu</div>
            <div class="color-code" id="colorHex">#000000</div>
            <div class="color-code" id="colorRgb">RGB: 0, 0, 0</div>
        </div>
    </div>

    <button id="startBtn">Kamerayı Başlat</button>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('cameraCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const startBtn = document.getElementById('startBtn');
        const colorPreview = document.getElementById('colorPreview');
        const colorName = document.getElementById('colorName');
        const colorHex = document.getElementById('colorHex');
        const colorRgb = document.getElementById('colorRgb');

        let stream = null;
        let animationId = null;

        startBtn.addEventListener('click', async () => {
            if (stream) {
                stopCamera();
            } else {
                await startCamera();
            }
        });

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 640 } } 
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    canvas.width = 400;
                    canvas.height = 400;
                    startBtn.textContent = "Kamerayı Kapat";
                    startBtn.style.background = "#ff3b30";
                    tick();
                };
            } catch (err) {
                alert("Kameraya erişilemedi. İzin verdiğinizden emin olun.");
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            if (animationId) cancelAnimationFrame(animationId);
            video.srcObject = null;
            startBtn.textContent = "Kamerayı Başlat";
            startBtn.style.background = "#007aff";
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function tick() {
            if (!stream) return;

            // Video karesini kare şeklinde Canvas'a çiz (merkez odaklı kırpma)
            const size = Math.min(video.videoWidth, video.videoHeight);
            const sx = (video.videoWidth - size) / 2;
            const sy = (video.videoHeight - size) / 2;
            
            ctx.drawImage(video, sx, sy, size, size, 0, 0, canvas.width, canvas.height);

            // Tam ortadaki pikselin (200, 200) koordinatını oku
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const pixel = ctx.getImageData(centerX, centerY, 1, 1).data;

            const r = pixel[0];
            const g = pixel[1];
            const b = pixel[2];

            // Arayüzü güncelle
            const hex = rgbToHex(r, g, b);
            colorPreview.style.backgroundColor = hex;
            colorHex.textContent = hex.toUpperCase();
            colorRgb.textContent = `RGB: ${r}, ${g}, ${b}`;
            colorName.textContent = getColorName(r, g, b);

            animationId = requestAnimationFrame(tick);
        }

        function rgbToHex(r, g, b) {
            return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
        }

        // Basit renk eşleştirme algoritması
        function getColorName(r, g, b) {
            const colors = [
                { name: "Kırmızı", r: 255, g: 0, b: 0 },
                { name: "Yeşil", r: 0, g: 255, b: 0 },
                { name: "Mavi", r: 0, g: 0, b: 255 },
                { name: "Sarı", r: 255, g: 255, b: 0 },
                { name: "Turuncu", r: 255, g: 165, b: 0 },
                { name: "Mor", r: 128, g: 0, b: 128 },
                { name: "Siyah", r: 15, g: 15, b: 15 },
                { name: "Beyaz", r: 240, g: 240, b: 240 },
                { name: "Gri", r: 128, g: 128, b: 128 },
                { name: "Kahverengi", r: 139, g: 69, b: 19 },
                { name: "Turkuaz", r: 64, g: 224, b: 208 },
                { name: "Pembe", r: 255, g: 192, b: 203 }
            ];

            let closestColor = colors[0];
            let minDistance = Infinity;

            // 3 Boyutlu RGB uzayında en yakın rengi bul (Öklid mesafesi)
            colors.forEach(color => {
                const distance = Math.sqrt(
                    Math.pow(r - color.r, 2) +
                    Math.pow(g - color.g, 2) +
                    Math.pow(b - color.b, 2)
                );
                if (distance < minDistance) {
                    minDistance = distance;
                    closestColor = color;
                }
            });

            // Eğer çok karanlıksa siyah, çok parlaksa beyaz de
            const brightness = (r + g + b) / 3;
            if (brightness < 35) return "Siyah / Çok Koyu";
            if (brightness > 230) return "Beyaz / Çok Parlak";

            return closestColor.name;
        }
    </script>
</body>
</html>
