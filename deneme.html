<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanal Lazer Metre</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d0d;
            color: #00ffcc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 1.1rem;
            letter-spacing: 3px;
            margin: 10px 0;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
        }

        #container {
            position: relative;
            width: 95vw;
            max-width: 500px;
            aspect-ratio: 3/4;
            border: 2px solid #00ffcc;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.15);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            cursor: crosshair;
        }

        /* Sci-Fi HUD Katmanı */
        .hud {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            z-index: 3;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            text-shadow: 1px 1px 3px #000;
        }

        /* Ortadaki Hedef Noktası */
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            border: 1px solid rgba(0, 255, 204, 0.6);
            border-radius: 50%;
            z-index: 3;
            pointer-events: none;
        }
        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: #00ffcc;
        }
        .crosshair::before { top: 50%; left: -5px; width: 40px; height: 1px; transform: translateY(-50%); }
        .crosshair::after { left: 50%; top: -5px; height: 40px; width: 1px; transform: translateX(-50%); }

        /* Ölçüm Sonuç Paneli */
        .result-panel {
            position: absolute;
            bottom: 15px;
            left: 15px;
            right: 15px;
            background: rgba(13, 13, 13, 0.85);
            border: 1px solid #00ffcc;
            border-radius: 8px;
            padding: 12px;
            z-index: 3;
            text-align: center;
        }

        .measurement {
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px #00ffcc;
            margin-bottom: 5px;
        }

        /* Kontrol Paneli */
        .controls {
            width: 95vw;
            max-width: 500px;
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            box-sizing: border-box;
        }

        .btn-row {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            background: transparent;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 12px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 6px;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        button:active {
            background: #00ffcc;
            color: #000;
        }

        .slider-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            gap: 10px;
        }

        input[type="range"] {
            flex: 1;
            accent-color: #00ffcc;
        }
    </style>
</head>
<body>

    <h1>[ TELEMETRİK ÖLÇÜM SİSTEMİ ]</h1>
    
    <div id="container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="measureCanvas"></canvas>
        
        <div class="hud">
            <div>MOD: MANUEL ÖLÇÜM</div>
            <div id="telemetry">MERKEZ TELEMETRİ: -- cm</div>
        </div>

        <div class="crosshair"></div>

        <div class="result-panel">
            <div class="measurement" id="resultText">0.00 cm</div>
            <div style="font-size: 10px; opacity: 0.7;">Ekrandaki iki noktaya dokunarak ölçün</div>
        </div>
    </div>

    <div class="controls">
        <div class="btn-row">
            <button id="startBtn">Kamerayı Aç</button>
            <button id="clearBtn">Sıfırla</button>
        </div>
        <div class="slider-container">
            <span>Kalibrasyon (Ölçek):</span>
            <input type="range" id="scaleSlider" min="0.05" max="2.00" step="0.01" value="0.25">
            <span id="scaleValue">0.25</span>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('measureCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const clearBtn = document.getElementById('clearBtn');
        const scaleSlider = document.getElementById('scaleSlider');
        const scaleValue = document.getElementById('scaleValue');
        const resultText = document.getElementById('resultText');
        const telemetryText = document.getElementById('telemetry');

        let stream = null;
        let points = []; // Kullanıcının tıkladığı koordinatlar [{x, y}]
        let scaleFactor = 0.25; // Pikseli santimetreye çevirme katsayısı

        // Sürgüyü dinle (Kalibrasyon ayarı)
        scaleSlider.addEventListener('input', (e) => {
            scaleFactor = parseFloat(e.target.value);
            scaleValue.textContent = scaleFactor.toFixed(2);
            calculateDistance();
        });

        startBtn.addEventListener('click', async () => {
            if (stream) {
                stopCamera();
            } else {
                await startCamera();
            }
        });

        clearBtn.addEventListener('click', () => {
            points = [];
            resultText.textContent = "0.00 cm";
            drawScene();
        });

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } } 
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    resizeCanvas();
                    startBtn.textContent = "Kamerayı Kapat";
                    requestAnimationFrame(updateTelemetry);
                };
            } catch (err) {
                alert("Kamera başlatılamadı. İzin verdiğinizden emin olun.");
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            video.srcObject = null;
            startBtn.textContent = "Kamerayı Aç";
            telemetryText.textContent = "MERKEZ TELEMETRİ: -- cm";
        }

        function resizeCanvas() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            drawScene();
        }

        window.addEventListener('resize', resizeCanvas);

        // Dokunma / Tıklama Olayını Yakalama
        canvas.addEventListener('click', (e) => {
            if (!stream) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (points.length >= 2) {
                points = []; // 2 noktadan sonra yeni tıklamada sıfırla
            }

            points.push({ x, y });
            calculateDistance();
            drawScene();
        });

        // İki nokta arasındaki mesafeyi hesaplama
        function calculateDistance() {
            if (points.length < 2) return;

            const p1 = points[0];
            const p2 = points[1];

            // Öklid Bağıntısı ile piksel mesafesini bul
            const pixelDist = Math.sqrt(Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2));
            
            // Piksel mesafesini ölçek katsayısıyla cm'ye çevir
            const realDist = pixelDist * scaleFactor;
            
            resultText.textContent = `${realDist.toFixed(2)} cm`;
        }

        // Çizim İşlemleri (Noktalar ve Çizgiler)
        function drawScene() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (points.length === 0) return;

            // Nokta 1
            ctx.beginPath();
            ctx.arc(points[0].x, points[0].y, 6, 0, Math.PI * 2);
            ctx.fillStyle = '#ff0055';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff0055';
            ctx.fill();

            if (points.length === 1) return;

            // Nokta 2
            ctx.beginPath();
            ctx.arc(points[1].x, points[1].y, 6, 0, Math.PI * 2);
            ctx.fillStyle = '#ff0055';
            ctx.fill();

            // Aradaki Kesikli Çizgi
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            ctx.lineTo(points[1].x, points[1].y);
            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 3;
            ctx.setLineDash([5, 5]);
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#00ffcc';
            ctx.stroke();
            ctx.setLineDash([]); // Çizgiyi sıfırla
            ctx.shadowBlur = 0; // Gölgeyi sıfırla
        }

        // Simüle Edilmiş Lazer Telemetri (Ortadaki hedef mesafesi)
        // Kameradaki merkez piksellerin odak/parlaklık verisine göre değişir
        function updateTelemetry() {
            if (!stream) return;

            // Arka plandaki video karesinden merkez pikseli analiz etme (Simülasyon amaçlı)
            // Kamera görüntüsü üzerinden dinamik ve hareketli bir telemetri değeri üretir
            const randomVariance = Math.sin(Date.now() / 500) * 2;
            const estimatedBaseDist = 45 + randomVariance; // varsayılan odak mesafesi

            telemetryText.textContent = `MERKEZ TELEMETRİ: ~${estimatedBaseDist.toFixed(1)} cm`;

            requestAnimationFrame(updateTelemetry);
        }
    </script>
</body>
</html>
