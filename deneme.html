<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi-Radar Sinyal Analizörü</title>
    <style>
        :root {
            --neon-green: #00ff66;
            --neon-red: #ff3333;
            --neon-blue: #00ffff;
            --dark-bg: #0a0f0d;
            --panel-bg: #111a16;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 15px;
            width: 100%;
            border-bottom: 1px solid rgba(0, 255, 102, 0.2);
        }

        h1 {
            margin: 0;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon-green);
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 500px;
            padding: 15px;
            box-sizing: border-box;
            gap: 15px;
        }

        /* Radar Ekranı */
        .radar-screen {
            position: relative;
            width: 280px;
            height: 280px;
            border: 2px solid var(--neon-green);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,255,102,0.03) 0%, rgba(0,0,0,0.9) 100%);
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.15);
            overflow: hidden;
        }

        canvas#radar-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Seçili Ağ Detay Kartı */
        .details-card {
            width: 100%;
            background-color: var(--panel-bg);
            border: 1px solid rgba(0, 255, 102, 0.2);
            border-radius: 6px;
            padding: 10px 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .details-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            opacity: 0.7;
            border-bottom: 1px dashed rgba(0, 255, 102, 0.2);
            padding-bottom: 3px;
            margin-bottom: 3px;
        }

        .details-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }

        /* Grafik Alanı */
        .graph-container {
            width: 100%;
            height: 100px;
            background-color: var(--panel-bg);
            border: 1px solid rgba(0, 255, 102, 0.2);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }

        canvas#graph-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* WiFi Listesi */
        .control-panel {
            width: 100%;
            background-color: var(--panel-bg);
            border: 1px solid rgba(0, 255, 102, 0.15);
            border-radius: 8px;
            padding: 12px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            background-color: transparent;
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            padding: 10px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .btn:hover {
            background-color: var(--neon-green);
            color: var(--dark-bg);
            box-shadow: 0 0 15px var(--neon-green);
        }

        .btn-stop {
            color: var(--neon-red);
            border-color: var(--neon-red);
        }

        .btn-stop:hover {
            background-color: var(--neon-red);
            color: white;
            box-shadow: 0 0 15px var(--neon-red);
        }

        .wifi-list {
            font-size: 0.8rem;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 120px;
            overflow-y: auto;
            background: rgba(0, 255, 102, 0.02);
            padding: 8px;
            border-radius: 4px;
            border: 1px solid rgba(0, 255, 102, 0.1);
        }

        .wifi-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 6px;
            cursor: pointer;
            border-radius: 3px;
            transition: background 0.2s;
        }

        .wifi-row:hover {
            background: rgba(0, 255, 102, 0.1);
        }

        .wifi-row.selected {
            background: rgba(0, 255, 102, 0.2);
            border-left: 3px solid var(--neon-green);
        }

        .status-message {
            font-size: 0.8rem;
            text-align: center;
            color: #888;
        }

        /* Özel İnce Scrollbar */
        .wifi-list::-webkit-scrollbar {
            width: 4px;
        }
        .wifi-list::-webkit-scrollbar-thumb {
            background: var(--neon-green);
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <header>
        <h1>WIFI-RADAR SCANNER</h1>
        <div class="status-message" id="status-text">WiFi Alıcısı Pasif. Taramayı Başlatın.</div>
    </header>

    <div class="main-container">
        
        <div class="radar-screen">
            <canvas id="radar-canvas"></canvas>
        </div>

        <div class="details-card">
            <div class="details-title">Seçili İstasyon Detayları</div>
            <div class="details-row"><span>SSID (Ağ Adı):</span><span id="det-ssid" style="color: var(--neon-blue);">Seçim Yok</span></div>
            <div class="details-row"><span>Kanal / Sıklık:</span><span id="det-chan">--</span></div>
            <div class="details-row"><span>Sinyal Gücü:</span><span id="det-signal">-- dBm</span></div>
            <div class="details-row"><span>Güvenlik Protokolü:</span><span id="det-sec">--</span></div>
        </div>

        <div class="graph-container">
            <canvas id="graph-canvas"></canvas>
        </div>

        <div class="control-panel">
            <button class="btn" id="scan-btn">WiFi Sinyallerini Tara</button>
            
            <div class="wifi-list" id="wifi-list-container">
                </div>
        </div>

    </div>

    <script>
        const radarCanvas = document.getElementById('radar-canvas');
        const radarCtx = radarCanvas.getContext('2d');
        const graphCanvas = document.getElementById('graph-canvas');
        const graphCtx = graphCanvas.getContext('2d');

        // Canvanları Boyutlandır
        function initCanvases() {
            radarCanvas.width = radarCanvas.parentElement.clientWidth;
            radarCanvas.height = radarCanvas.parentElement.clientHeight;
            graphCanvas.width = graphCanvas.parentElement.clientWidth;
            graphCanvas.height = graphCanvas.parentElement.clientHeight;
        }
        initCanvases();

        // Gerçekçi Simüle Edilen WiFi Ağları Listesi (Mesafe dbm ile ters orantılı)
        const simulatedNetworks = [
            { id: 1, ssid: "TURKTELEKOM_G5HG", dbm: -42, channel: 6, security: "WPA3-Personal", angle: 50, blipAlpha: 0, history: [] },
            { id: 2, ssid: "Superonline_WiFi_2.4GHz", dbm: -68, channel: 11, security: "WPA2-PSK", angle: 140, blipAlpha: 0, history: [] },
            { id: 3, ssid: "Zyxel_Modem_Komsu", dbm: -82, channel: 1, security: "WPA2-PSK", angle: 220, blipAlpha: 0, history: [] },
            { id: 4, ssid: "Turkcell_Superbox_LTE", dbm: -55, channel: 9, security: "WPA3", angle: 290, blipAlpha: 0, history: [] },
            { id: 5, ssid: "Belediye_FREE_WiFi", dbm: -89, channel: 13, security: "Open (Şifresiz)", angle: 15, blipAlpha: 0, history: [] }
        ];

        // Geçmiş veriyi doldur
        simulatedNetworks.forEach(net => {
            net.history = Array(50).fill(net.dbm);
        });

        let active = false;
        let sweepAngle = 0;
        let selectedNetworkId = 1; // Varsayılan seçili ağ
        let lastUpdateTime = 0;

        // Dom Elementleri
        const scanBtn = document.getElementById('scan-btn');
        const statusText = document.getElementById('status-text');
        const wifiListContainer = document.getElementById('wifi-list-container');
        
        const detSsid = document.getElementById('det-ssid');
        const detChan = document.getElementById('det-chan');
        const detSignal = document.getElementById('det-signal');
        const detSec = document.getElementById('det-sec');

        // Ses Efekti (Web Audio API ile Sonar Bip Sesi)
        let audioCtx = null;
        function playSonarBeep(frequency, volume) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();

                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
                
                gain.gain.setValueAtTime(volume * 0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } catch (e) {
                console.log("Audio hatası:", e);
            }
        }

        // WiFi Listesini Arayüze Bas
        function renderWiFiList() {
            wifiListContainer.innerHTML = '';
            simulatedNetworks.forEach(net => {
                const row = document.createElement('div');
                row.className = `wifi-row ${net.id === selectedNetworkId ? 'selected' : ''}`;
                row.innerHTML = `
                    <span>⚡ ${net.ssid}</span>
                    <span>${net.dbm} dBm</span>
                `;
                row.addEventListener('click', () => {
                    selectedNetworkId = net.id;
                    renderWiFiList();
                    updateDetailCard();
                });
                wifiListContainer.appendChild(row);
            });
        }

        // Kart Detaylarını Güncelle
        function updateDetailCard() {
            const net = simulatedNetworks.find(n => n.id === selectedNetworkId);
            if (net) {
                detSsid.textContent = net.ssid;
                detChan.textContent = `Ch ${net.channel} (2.4 GHz)`;
                detSignal.textContent = `${net.dbm} dBm`;
                detSec.textContent = net.security;

                // Sinyal gücüne göre rengi değiştir
                if (net.dbm >= -60) detSignal.style.color = "var(--neon-green)";
                else if (net.dbm >= -80) detSignal.style.color = "var(--neon-blue)";
                else detSignal.style.color = "var(--neon-red)";
            }
        }

        // Başlat / Durdur Butonu
        scanBtn.addEventListener('click', () => {
            if (!active) {
                active = true;
                scanBtn.textContent = "Tarayıcıyı Kapat";
                scanBtn.classList.add('btn-stop');
                statusText.textContent = "Çevredeki kablosuz yayınlar taranıyor...";
                statusText.style.color = "var(--neon-green)";
                renderWiFiList();
                updateDetailCard();
                animate();
            } else {
                active = false;
                scanBtn.textContent = "WiFi Sinyallerini Tara";
                scanBtn.classList.remove('btn-stop');
                statusText.textContent = "Tarama durduruldu.";
                statusText.style.color = "#888";
            }
        });

        // WiFi Sinyal Güçlerinde Rastgele Küçük Dalgalanmalar Yarat (Gerçekçilik için)
        function simulateSignalFluctuations() {
            simulatedNetworks.forEach(net => {
                // Sinyali hafifçe oynat (+- 2 dBm)
                const change = Math.round((Math.random() - 0.5) * 3);
                let newDbm = net.dbm + change;
                // Mantıklı sınırlar içinde tut (-30 ile -95 arası)
                newDbm = Math.max(-95, Math.min(-30, newDbm));
                net.dbm = newDbm;

                // Geçmiş veriyi güncelle (Grafik için)
                net.history.push(newDbm);
                net.history.shift();
            });
            renderWiFiList();
            updateDetailCard();
        }

        // Ana Döngü
        function animate() {
            if (!active) return;

            // Radar açısını döndür (Yavaş, kontrollü bir tarama)
            sweepAngle = (sweepAngle + 1.2) % 360;

            // Radar iğnesi her ağın açısından geçerken onu tetikle
            simulatedNetworks.forEach(net => {
                if (Math.abs(sweepAngle - net.angle) < 1.2) {
                    net.blipAlpha = 1.0; // Parlama tetiklendi!
                    // Sinyal gücü yüksekse daha tiz, zayıfsa daha pes bir ses çal
                    const pitch = 300 + (Math.abs(net.dbm) * -4); // Örn: -40 dbm -> 140Hz, -90 dbm -> 60Hz
                    playSonarBeep(pitch, (100 - Math.abs(net.dbm)) / 100);
                }
            });

            // Belirli aralıklarla sinyal verilerini dalgalandır (Saniyede 1 kez)
            const now = performance.now();
            if (now - lastUpdateTime > 1000) {
                simulateSignalFluctuations();
                lastUpdateTime = now;
            }

            drawRadar();
            drawGraph();

            requestAnimationFrame(animate);
        }

        // Radar Ekranını Çiz
        function drawRadar() {
            const w = radarCanvas.width;
            const h = radarCanvas.height;
            const cx = w / 2;
            const cy = h / 2;
            const maxRadius = Math.min(w, h) / 2 - 10;

            radarCtx.clearRect(0, 0, w, h);

            // 1. Grid Halkaları (Uzaklık / Sinyal Seviyeleri)
            radarCtx.strokeStyle = 'rgba(0, 255, 102, 0.12)';
            radarCtx.lineWidth = 1;
            const levelLabels = ["-30 dBm", "-50 dBm", "-70 dBm", "-90 dBm"];
            let idx = 0;
            for (let r = maxRadius; r > 0; r -= maxRadius / 4) {
                radarCtx.beginPath();
                radarCtx.arc(cx, cy, r, 0, Math.PI * 2);
                radarCtx.stroke();
                
                // Seviye Etiketleri
                radarCtx.fillStyle = 'rgba(0, 255, 102, 0.3)';
                radarCtx.font = '7px monospace';
                radarCtx.fillText(levelLabels[idx++], cx + 5, cy - r + 10);
            }

            // 2. Çapraz Yön Çizgileri
            radarCtx.strokeStyle = 'rgba(0, 255, 102, 0.08)';
            radarCtx.beginPath();
            radarCtx.moveTo(cx - maxRadius, cy); radarCtx.lineTo(cx + maxRadius, cy);
            radarCtx.moveTo(cx, cy - maxRadius); radarCtx.lineTo(cx, cy + maxRadius);
            radarCtx.stroke();

            // 3. Dönen Radar Tarama İğnesi (Sweep)
            const radAngle = (sweepAngle * Math.PI) / 180;
            const sweepX = cx + maxRadius * Math.cos(radAngle);
            const sweepY = cy + maxRadius * Math.sin(radAngle);

            // Radar Sweep Solma Kuyruğu
            const sweepGrad = radarCtx.createLinearGradient(cx, cy, sweepX, sweepY);
            sweepGrad.addColorStop(0, 'rgba(0, 255, 102, 0.25)');
            sweepGrad.addColorStop(1, 'rgba(0, 255, 102, 0)');
            
            radarCtx.fillStyle = sweepGrad;
            radarCtx.beginPath();
            radarCtx.moveTo(cx, cy);
            radarCtx.arc(cx, cy, maxRadius, radAngle, radAngle - 0.25 * Math.PI, true);
            radarCtx.closePath();
            radarCtx.fill();

            // Tarama Çizgisi
            radarCtx.strokeStyle = 'rgba(0, 255, 102, 0.7)';
            radarCtx.lineWidth = 1.2;
            radarCtx.beginPath();
            radarCtx.moveTo(cx, cy);
            radarCtx.lineTo(sweepX, sweepY);
            radarCtx.stroke();

            // 4. WiFi Ağ Noktalarını (Blips) Ekrana Çiz
            simulatedNetworks.forEach(net => {
                const angleRad = (net.angle * Math.PI) / 180;

                // dBm'i merkez uzaklığına eşle: -30dBm en yakın, -100dBm en uzak sınır
                const distanceRatio = (Math.abs(net.dbm) - 30) / (100 - 30); // 0 (merkez) ile 1 (kenar) arası
                const r = Math.max(15, distanceRatio * maxRadius);

                const blipX = cx + r * Math.cos(angleRad);
                const blipY = cy + r * Math.sin(angleRad);

                if (net.blipAlpha > 0) {
                    net.blipAlpha -= 0.008; // Yavaşça söndür
                }

                // Sinyal gücüne göre renk seç
                let colorString = `rgba(0, 255, 102, ${Math.max(net.blipAlpha, 0.2)})`; // Güçlü / Normal
                if (net.dbm < -75) {
                    colorString = `rgba(255, 51, 51, ${Math.max(net.blipAlpha, 0.2)})`; // Zayıf
                } else if (net.id === selectedNetworkId) {
                    colorString = `rgba(0, 255, 255, ${Math.max(net.blipAlpha, 0.4)})`; // Seçili Ağ
                }

                // Parlama Efekti (Büyük Halka)
                radarCtx.fillStyle = colorString;
                radarCtx.beginPath();
                radarCtx.arc(blipX, blipY, 14 * net.blipAlpha, 0, Math.PI * 2);
                radarCtx.fill();

                // Merkez Nokta
                radarCtx.fillStyle = colorString;
                radarCtx.beginPath();
                radarCtx.arc(blipX, blipY, 4, 0, Math.PI * 2);
                radarCtx.fill();

                // Ağ İsmi Etiketi
                radarCtx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                radarCtx.font = '8px monospace';
                radarCtx.fillText(net.ssid.substring(0, 10) + '..', blipX + 8, blipY + 3);
            });
        }

        // Seçili WiFi Sinyal Geçmiş Grafiği (Zaman Analizi)
        function drawGraph() {
            graphCtx.clearRect(0, 0, graphCanvas.width, graphCanvas.height);

            // Arka Plan Grid Çizimi
            graphCtx.strokeStyle = 'rgba(0, 255, 102, 0.05)';
            graphCtx.lineWidth = 1;
            for (let i = 0; i < graphCanvas.width; i += 40) {
                graphCtx.beginPath();
                graphCtx.moveTo(i, 0); graphCtx.lineTo(i, graphCanvas.height);
                graphCtx.stroke();
            }

            const selectedNet = simulatedNetworks.find(n => n.id === selectedNetworkId);
            if (!selectedNet || selectedNet.history.length < 2) return;

            // Sinyal Çizgisi
            graphCtx.strokeStyle = selectedNet.dbm > -75 ? 'var(--neon-green)' : 'var(--neon-red)';
            graphCtx.lineWidth = 2;
            graphCtx.beginPath();

            const step = graphCanvas.width / (selectedNet.history.length - 1);
            for (let i = 0; i < selectedNet.history.length; i++) {
                const val = selectedNet.history[i]; // -30 ile -100 arası
                // Grafiği dikey eksende dikey sığdır (-30 üstte, -100 altta)
                const ratio = (Math.abs(val) - 30) / 70;
                const y = 10 + ratio * (graphCanvas.height - 20);
                const x = i * step;

                if (i === 0) {
                    graphCtx.moveTo(x, y);
                } else {
                    graphCtx.lineTo(x, y);
                }
            }
            graphCtx.stroke();

            // Grafik Bilgisi Yazısı
            graphCtx.fillStyle = 'rgba(0, 255, 102, 0.7)';
            graphCtx.font = '9px monospace';
            graphCtx.fillText(`TAKIP: ${selectedNet.ssid} | SİNYAL ANALİZİ (dBm)`, 10, 15);
        }

        // Başlangıç Kurulumları
        renderWiFiList();
        updateDetailCard();
        drawRadar();
    </script>
</body>
</html>
