<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rayılmazan Yönetim</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f4f4f4; }
        .tab-menu { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: #ddd; cursor: pointer; border-radius: 5px; font-size: 12px; }
        .tab-btn.active { background: #007bff; color: white; }
        .content { display: none; background: white; padding: 15px; border-radius: 5px; }
        .content.active { display: block; }
        .card { border-bottom: 1px solid #eee; padding: 10px 0; }
        button.copy-btn { background: #28a745; color: white; border: none; padding: 5px; cursor: pointer; border-radius: 3px; }
    </style>
</head>
<body>

<div class="tab-menu">
    <button class="tab-btn active" onclick="showTab('tab1')">Arıza</button>
    <button class="tab-btn" onclick="showTab('tab2')">Ağ/IP</button>
    <button class="tab-btn" onclick="showTab('tab3')">Komut</button>
</div>

<!-- Tab 1: Arıza -->
<div id="tab1" class="content active">
    <h3>Arıza Çözümleri</h3>
    <div class="card"><strong>PXE Boot Hatası:</strong> BIOS'tan Boot sırasını kontrol et, 'Network Boot'u devre dışı bırak.</div>
    <div class="card"><strong>AMD Kapanma:</strong> İşlemci fanını temizle, termal macunu yenile.</div>
</div>

<!-- Tab 2: Ağ/IP -->
<div id="tab2" class="content">
    <h3>Ağ/IP Tarama (Test)</h3>
    <select id="ipBlock">
        <option value="192.168.1">192.168.1.X</option>
        <option value="192.168.2">192.168.2.X</option>
        <option value="10.15.1">10.15.1.X (Fatih)</option>
    </select>
    <button onclick="scanNetwork()">Taramayı Başlat</button>
    <div id="scanResult" style="margin-top:10px;"></div>
</div>

<!-- Tab 3: Komutlar -->
<div id="tab3" class="content">
    <h3>Pardus Komutları</h3>
    <div class="card">Ağ Servisi Başlat: <button class="copy-btn" onclick="copyText('sudo systemctl restart NetworkManager')">Kopyala</button></div>
    <div class="card">Güncelleme: <button class="copy-btn" onclick="copyText('sudo apt update && sudo apt upgrade -y')">Kopyala</button></div>
</div>

<script>
    function showTab(id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }
    function copyText(text) { navigator.clipboard.writeText(text); alert("Kopyalandı: " + text); }
    function scanNetwork() {
        const block = document.getElementById('ipBlock').value;
        document.getElementById('scanResult').innerHTML = "Tarama simülasyonu başlatıldı... " + block + ".x bloğu kontrol ediliyor.";
    }
</script>
</body>
</html>
