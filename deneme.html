<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Net-Radar Ağ Teşhis</title>
    <style>
        :root {
            --neon-green: #00ff66;
            --neon-red: #ff3333;
            --neon-blue: #00ffff;
            --dark-bg: #0a0f0d;
            --panel-bg: #111a16;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 15px;
            width: 100%;
            border-bottom: 1px solid rgba(0, 255, 102, 0.2);
        }

        h1 {
            margin: 0;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon-green);
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 500px;
            padding: 15px;
            box-sizing: border-box;
            gap: 15px;
        }

        /* Radar Ekranı */
        .radar-screen {
            position: relative;
            width: 280px;
            height: 280px;
            border: 2px solid var(--neon-green);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,255,102,0.03) 0%, rgba(0,0,0,0.9) 100%);
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.15);
            overflow: hidden;
        }

        canvas#radar-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Bilgi Panelleri */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
        }

        .stat-card {
            background-color: var(--panel-bg);
            border: 1px solid rgba(0, 255, 102, 0.2);
            border-radius: 6px;
            padding: 10px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .stat-val {
            font-size: 1.4rem;
            font-weight: bold;
            text-shadow: 0 0 8px var(--neon-green);
        }

        /* Grafik Alanı */
        .graph-container {
            width: 100%;
            height: 100px;
            background-color: var(--panel-bg);
            border: 1px solid rgba(0, 255, 102, 0.2);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }

        canvas#graph-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Kontrol Paneli */
        .control-panel {
            width: 100%;
            background-color: var(--panel-bg);
            border: 1px solid rgba(0, 255, 102, 0.15);
            border-radius: 8px;
            padding: 12px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            background-color: transparent;
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            padding: 10px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .btn:hover {
            background-color: var(--neon-green);
            color: var(--dark-bg);
            box-shadow: 0 0 15px var(--neon-green);
        }

        .btn-stop {
            color: var(--neon-red);
            border-color: var(--neon-red);
        }

        .btn-stop:hover {
            background-color: var(--neon-red);
            color: white;
            box-shadow: 0 0 15px var(--neon-red);
        }

        .node-list {
            font-size: 0.75rem;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: rgba(0, 255, 102, 0.02);
            padding: 8px;
            border-radius: 4px;
            border: 1px solid rgba(0, 255, 102, 0.1);
        }

        .node-row {
            display: flex;
            justify-content: space-between;
        }

        .status-message {
            font-size: 0.8rem;
            text-align: center;
            color: #888;
        }
    </style>
</head>
<body>

    <header>
        <h1>NET-RADAR v1.0</h1>
        <div class="status-message" id="status-text">Sistem hazır. Taramayı başlatın.</div>
    </header>

    <div class="main-container">
        
        <div class="radar-screen">
            <canvas id="radar-canvas"></canvas>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Ort. Gecikme (Ping)</div>
                <div class="stat-val" id="avg-ping">-- ms</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Dalgalanma (Jitter)</div>
                <div class="stat-val" id="jitter-val" style="color: var(--neon-blue); text-shadow: 0 0 8px var(--neon-blue);">-- ms</div>
            </div>
        </div>

        <div class="graph-container">
            <canvas id="graph-canvas"></canvas>
        </div>

        <div class="control-panel">
            <button class="btn" id="scan-btn">Ağ Taramasını Başlat</button>
            
            <div class="node-list">
                <div class="node-row"><span>[1] Cloudflare (1.1.1.1)</span><span id="node-0">Bekliyor...</span></div>
                <div class="node-row"><span>[2] Google DNS (8.8.8.8)</span><span id="node-1">Bekliyor...</span></div>
                <div class="node-row"><span>[3] GitHub Server</span><span id="node-2">Bekliyor...</span></div>
                <div class="node-row"><span>[4] Microsoft Web</span><span id="node-3">Bekliyor...</span></div>
            </div>
        </div>

    </div>

    <script>
        const radarCanvas = document.getElementById('radar-canvas');
        const radarCtx = radarCanvas.getContext('2d');
        const graphCanvas = document.getElementById('graph-canvas');
        const graphCtx = graphCanvas.getContext('2d');

        // Canlı Boyutlandırma
        function initCanvases() {
            radarCanvas.width = radarCanvas.parentElement.clientWidth;
            radarCanvas.height = radarCanvas.parentElement.clientHeight;
            graphCanvas.width = graphCanvas.parentElement.clientWidth;
            graphCanvas.height = graphCanvas.parentElement.clientHeight;
        }
        initCanvases();

        // Teşhis Düğümleri (Gerçek web adresleri üzerinden ping testi yapacağız)
        const targetNodes = [
            { name: "Cloudflare", url: "https://1.1.1.1/favicon.ico", angle: 45, ping: null, blipAlpha: 0 },
            { name: "Google", url: "https://www.google.com/favicon.ico", angle: 135, ping: null, blipAlpha: 0 },
            { name: "GitHub", url: "https://github.com/favicon.ico", angle: 225, ping: null, blipAlpha: 0 },
            { name: "Microsoft", url: "https://www.microsoft.com/favicon.ico", angle: 315, ping: null, blipAlpha: 0 }
        ];

        let active = false;
        let sweepAngle = 0;
        let pingHistory = [];
        let lastPingTime = 0;

        // Butonlar ve Arayüz Güncellemeleri
        const scanBtn = document.getElementById('scan-btn');
        const statusText = document.getElementById('status-text');
        const avgPingText = document.getElementById('avg-ping');
        const jitterText = document.getElementById('jitter-val');

        // CORS Engeline Takılmadan Ping Süresi Ölçme Metodu (HTTP/HTTPS üzerinden)
        async function measurePing(node, index) {
            const start = performance.now();
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 2000); // 2 sn sınır

            try {
                // cache: 'no-store' kullanarak tarayıcının önbellekten çekmesini engelliyoruz
                await fetch(node.url, { 
                    mode: 'no-cors', 
                    cache: 'no-store',
                    signal: controller.signal
                });
                const duration = Math.round(performance.now() - start);
                clearTimeout(timeoutId);
                return duration;
            } catch (err) {
                // no-cors modunda sunucudan hata dönse bile el sıkışma süresini yakalayabiliriz
                const duration = Math.round(performance.now() - start);
                clearTimeout(timeoutId);
                return duration < 1900 ? duration : 999; // 999ms = Zaman Aşımı
            }
        }

        // Seçilen Düğümü Tetikle
        async function triggerNodePing(index) {
            const node = targetNodes[index];
            document.getElementById(`node-${index}`).textContent = "Taranıyor...";
            document.getElementById(`node-${index}`).style.color = "var(--neon-blue)";

            const result = await measurePing(node, index);
            node.ping = result;
            node.blipAlpha = 1.0; // Radar noktasını parlat

            // Geçmiş veriyi güncelle
            if (result < 999) {
                pingHistory.push(result);
                if (pingHistory.length > 50) pingHistory.shift();
                calculateStats();
                document.getElementById(`node-${index}`).textContent = `${result} ms`;
                document.getElementById(`node-${index}`).style.color = "var(--neon-green)";
            } else {
                document.getElementById(`node-${index}`).textContent = "Zaman Aşımı";
                document.getElementById(`node-${index}`).style.color = "var(--neon-red)";
            }
        }

        // İstatistikleri (Ortalama & Jitter) Hesapla
        function calculateStats() {
            if (pingHistory.length === 0) return;
            const avg = Math.round(pingHistory.reduce((a, b) => a + b, 0) / pingHistory.length);
            avgPingText.textContent = `${avg} ms`;

            // Jitter (Gecikme Sapması): Peş peşe gelen ping farklarının ortalamasıdır
            let totalDiff = 0;
            for (let i = 1; i < pingHistory.length; i++) {
                totalDiff += Math.abs(pingHistory[i] - pingHistory[i - 1]);
            }
            const jitter = pingHistory.length > 1 ? Math.round(totalDiff / (pingHistory.length - 1)) : 0;
            jitterText.textContent = `${jitter} ms`;
        }

        // Başlat/Durdur
        scanBtn.addEventListener('click', () => {
            if (!active) {
                active = true;
                scanBtn.textContent = "Taramayı Durdur";
                scanBtn.classList.add('btn-stop');
                statusText.textContent = "Ağ paketleri gönderiliyor... Canlı ping ölçümü aktif.";
                statusText.style.color = "var(--neon-green)";
                animate();
            } else {
                active = false;
                scanBtn.textContent = "Ağ Taramasını Başlat";
                scanBtn.classList.remove('btn-stop');
                statusText.textContent = "Tarama durduruldu.";
                statusText.style.color = "#888";
            }
        });

        // Ana Animasyon Döngüsü
        function animate() {
            if (!active) return;

            // Radar Tarama Açısını Güncelle (Dönüş hızı)
            sweepAngle = (sweepAngle + 1.5) % 360;

            // Radar çizgisi her 90 derecelik dilime geldiğinde ilgili sunucuyu pinglesin
            targetNodes.forEach((node, idx) => {
                // Açı eşleştiğinde (ufak bir toleransla) ping gönder
                if (Math.abs(sweepAngle - node.angle) < 1.5) {
                    triggerNodePing(idx);
                }
            });

            drawRadar();
            drawGraph();

            requestAnimationFrame(animate);
        }

        // Radar Ekranı Çizimi
        function drawRadar() {
            const w = radarCanvas.width;
            const h = radarCanvas.height;
            const cx = w / 2;
            const cy = h / 2;
            const maxRadius = Math.min(w, h) / 2 - 10;

            radarCtx.clearRect(0, 0, w, h);

            // 1. Grid Çemberleri Çizimi
            radarCtx.strokeStyle = 'rgba(0, 255, 102, 0.15)';
            radarCtx.lineWidth = 1;
            for (let r = maxRadius; r > 0; r -= maxRadius / 4) {
                radarCtx.beginPath();
                radarCtx.arc(cx, cy, r, 0, Math.PI * 2);
                radarCtx.stroke();
            }

            // 2. Çapraz Eksen Çizgileri
            radarCtx.strokeStyle = 'rgba(0, 255, 102, 0.1)';
            radarCtx.beginPath();
            radarCtx.moveTo(cx - maxRadius, cy); radarCtx.lineTo(cx + maxRadius, cy);
            radarCtx.moveTo(cx, cy - maxRadius); radarCtx.lineTo(cx, cy + maxRadius);
            radarCtx.stroke();

            // 3. Dönüp Duran Tarama İğnesi (Sweep line)
            const radAngle = (sweepAngle * Math.PI) / 180;
            const sweepX = cx + maxRadius * Math.cos(radAngle);
            const sweepY = cy + maxRadius * Math.sin(radAngle);

            // Tarama izinin arkasında kalan solma efekti (gradient)
            radarCtx.fillStyle = radarCtx.createRadialGradient(cx, cy, 0, cx, cy, maxRadius);
            
            radarCtx.beginPath();
            radarCtx.moveTo(cx, cy);
            radarCtx.arc(cx, cy, maxRadius, radAngle, radAngle - 0.25 * Math.PI, true);
            radarCtx.closePath();
            
            const sweepGrad = radarCtx.createLinearGradient(cx, cy, sweepX, sweepY);
            sweepGrad.addColorStop(0, 'rgba(0, 255, 102, 0.2)');
            sweepGrad.addColorStop(1, 'rgba(0, 255, 102, 0)');
            radarCtx.fillStyle = sweepGrad;
            radarCtx.fill();

            // Ana Tarama Çizgisi
            radarCtx.strokeStyle = 'rgba(0, 255, 102, 0.8)';
            radarCtx.lineWidth = 1.5;
            radarCtx.beginPath();
            radarCtx.moveTo(cx, cy);
            radarCtx.lineTo(sweepX, sweepY);
            radarCtx.stroke();

            // 4. Sunucu Noktaları (Blips) Çizimi
            targetNodes.forEach(node => {
                if (node.ping !== null) {
                    const nodeRad = (node.angle * Math.PI) / 180;
                    
                    // Ping değerini mesafeye ölçekle (Merkez = 0ms, Kenar = 300ms+)
                    const clampedPing = Math.min(node.ping, 300);
                    // Düşük ping merkeze yakın olsun, yüksek ping kenara gitsin
                    const distRatio = clampedPing / 300;
                    const r = 20 + distRatio * (maxRadius - 35); 

                    const blipX = cx + r * Math.cos(nodeRad);
                    const blipY = cy + r * Math.sin(nodeRad);

                    // Noktanın parlaması ve solması
                    if (node.blipAlpha > 0) {
                        node.blipAlpha -= 0.005; // Yavaşça sönme efekti
                    }

                    // Blip Dışı Halka
                    radarCtx.fillStyle = node.ping > 150 ? `rgba(255, 51, 51, ${node.blipAlpha * 0.3})` : `rgba(0, 255, 102, ${node.blipAlpha * 0.3})`;
                    radarCtx.beginPath();
                    radarCtx.arc(blipX, blipY, 12, 0, Math.PI * 2);
                    radarCtx.fill();

                    // Merkez Noktası
                    radarCtx.fillStyle = node.ping > 150 ? `rgba(255, 51, 51, ${node.blipAlpha})` : `rgba(0, 255, 102, ${node.blipAlpha})`;
                    radarCtx.beginPath();
                    radarCtx.arc(blipX, blipY, 5, 0, Math.PI * 2);
                    radarCtx.fill();

                    // Etiket (İsim ve Ping değeri)
                    radarCtx.fillStyle = `rgba(0, 255, 102, ${Math.max(node.blipAlpha, 0.4)})`;
                    radarCtx.font = '8px monospace';
                    radarCtx.fillText(`${node.name}: ${node.ping}ms`, blipX + 8, blipY + 3);
                }
            });
        }

        // Ağ Gecikme Geçmişi Grafiği
        function drawGraph() {
            graphCtx.clearRect(0, 0, graphCanvas.width, graphCanvas.height);

            // Arka Plan İnce Grid
            graphCtx.strokeStyle = 'rgba(0, 255, 102, 0.05)';
            graphCtx.lineWidth = 1;
            for (let i = 0; i < graphCanvas.width; i += 40) {
                graphCtx.beginPath();
                graphCtx.moveTo(i, 0); graphCtx.lineTo(i, graphCanvas.height);
                graphCtx.stroke();
            }

            if (pingHistory.length < 2) return;

            // Çizgi Grafiği
            graphCtx.strokeStyle = 'var(--neon-green)';
            graphCtx.lineWidth = 1.5;
            graphCtx.beginPath();

            const step = graphCanvas.width / (pingHistory.length - 1);
            for (let i = 0; i < pingHistory.length; i++) {
                const val = pingHistory[i];
                // 0ms - 200ms aralığını dikey eksene sığdır
                const y = graphCanvas.height - (Math.min(val, 200) / 200) * (graphCanvas.height - 10) - 5;
                const x = i * step;

                if (i === 0) {
                    graphCtx.moveTo(x, y);
                } else {
                    graphCtx.lineTo(x, y);
                }
            }
            graphCtx.stroke();
        }

        // Sayfa ilk yüklendiğinde bir tur boş radar çizilsin
        drawRadar();
    </script>
</body>
</html>
