
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>rayılmazan | IP Kamera İzleyici</title>
    <style>
        body { background: #050505; color: #00ff00; font-family: monospace; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .kamera-kart { border: 1px solid #333; padding: 10px; background: #0a0a0a; }
        .durum-bar { height: 5px; margin-top: 10px; }
        .aktif { background: #00ff00; }
        .pasif { background: #ff0000; }
    </style>
</head>
<body>
    <h2>KAMERA VE TEŞHİS PORTALI</h2>
    <div id="kamera-grid" class="grid"></div>

    <script>
        const kameralar = [
            { ad: "Kamera-Giris", ip: "192.168.1.100" },
            { ad: "Kamera-Lab", ip: "192.168.1.101" }
        ];

        function olustur() {
            const grid = document.getElementById('kamera-grid');
            kameralar.forEach(k => {
                const div = document.createElement('div');
                div.className = 'kamera-kart';
                div.innerHTML = `
                    <h3>${k.ad}</h3>
                    <img src="http://${k.ip}/video" width="100%" onerror="this.src='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+A8AAQUBAScY42YAAAAASUVORK5CYII='">
                    <div class="durum-bar" id="durum-${k.ip.replace(/\./g, '-')}"></div>
                    <small>${k.ip}</small>
                `;
                grid.appendChild(div);
            });
        }

        async function kontrol() {
            for (let k of kameralar) {
                try {
                    await fetch(`http://${k.ip}`, { mode: 'no-cors' });
                    document.getElementById(`durum-${k.ip.replace(/\./g, '-')}`).className = 'durum-bar aktif';
                } catch {
                    document.getElementById(`durum-${k.ip.replace(/\./g, '-')}`).className = 'durum-bar pasif';
                }
            }
        }

        olustur();
        setInterval(kontrol, 30000);
        kontrol();
    </script>
</body>
</html>
