<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sade Kamera Ölçüm Aracı</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 1rem;
            margin: 10px 0;
            font-weight: 500;
            letter-spacing: 1px;
            color: #aaa;
        }

        #container {
            position: relative;
            width: 95vw;
            max-width: 500px;
            aspect-ratio: 3/4;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        /* Bilgi Paneli */
        .info-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 15px;
            z-index: 3;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .result {
            font-size: 2rem;
            font-weight: 700;
            color: #00ff66;
            margin-bottom: 4px;
        }

        .instruction {
            font-size: 11px;
            color: #ccc;
        }

        /* Kontroller */
        .controls {
            width: 95vw;
            max-width: 500px;
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 10px;
            box-sizing: border-box;
        }

        .btn-row {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            background: #222;
            border: 1px solid #44;
            color: #fff;
            padding: 14px;
            cursor: pointer;
            font-weight: 600;
            border-radius: 10px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        button:active {
            background: #333;
            transform: scale(0.98);
        }

        #startBtn {
            background: #007aff;
            border-color: #007aff;
        }

        #startBtn:active {
            background: #0056b3;
        }

        .slider-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            color: #aaa;
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 15px;
            border-radius: 10px;
        }

        input[type="range"] {
            flex: 1;
            accent-color: #007aff;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>KAMERALI ÖLÇÜM ARACI</h1>
    
    <div id="container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="measureCanvas"></canvas>
        
        <div class="info-panel">
            <div class="result" id="resultText">0.00 cm</div>
            <div class="instruction" id="helperText">Başlamak için kamerayı açın ve ekrana dokunun</div>
        </div>
    </div>

    <div class="controls">
        <div class="btn-row">
            <button id="startBtn">Kamerayı Aç</button>
            <button id="clearBtn">Temizle</button>
        </div>
        <div class="slider-container">
            <span>Kalibrasyon (Ölçek):</span>
            <input type="range" id="scaleSlider" min="0.05" max="1.50" step="0.01" value="0.25">
            <span id="scaleValue" style="font-weight: bold; color: #fff;">0.25</span>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('measureCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const clearBtn = document.getElementById('clearBtn');
        const scaleSlider = document.getElementById('scaleSlider');
        const scaleValue = document.getElementById('scaleValue');
        const resultText = document.getElementById('resultText');
        const helperText = document.getElementById('helperText');

        let stream = null;
        let points = []; 
        let scaleFactor = 0.25; // Pikseli santimetreye dönüştürme katsayısı

        // Kalibrasyon ayarı
        scaleSlider.addEventListener('input', (e) => {
            scaleFactor = parseFloat(e.target.value);
            scaleValue.textContent = scaleFactor.toFixed(2);
            updateMeasurement();
        });

        startBtn.addEventListener('click', async () => {
            if (stream) {
                stopCamera();
            } else {
                await startCamera();
            }
        });

        clearBtn.addEventListener('click', () => {
            points = [];
            resultText.textContent = "0.00 cm";
            if (stream) helperText.textContent = "Ölçmek istediğiniz ilk noktaya dokunun";
            drawScene();
        });

        async function startCamera() {
            try {
                // Arka kamerayı açar
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 960 } } 
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    resizeCanvas();
                    startBtn.textContent = "Kamerayı Kapat";
                    helperText.textContent = "Ölçmek istediğiniz ilk noktaya dokunun";
                };
            } catch (err) {
                alert("Kamera başlatılamadı. Lütfen izin verdiğinizden emin olun.");
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            video.srcObject = null;
            startBtn.textContent = "Kamerayı Aç";
            helperText.textContent = "Başlamak için kamerayı açın ve ekrana dokunun";
            points = [];
            resultText.textContent = "0.00 cm";
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function resizeCanvas() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            drawScene();
        }

        window.addEventListener('resize', resizeCanvas);

        // Ekran dokunuşlarını yakalama
        canvas.addEventListener('click', (e) => {
            if (!stream) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // 2 nokta zaten varsa, yeni tıklamada ekranı sıfırla ve yeni başlangıç noktası yap
            if (points.length >= 2) {
                points = [];
            }

            points.push({ x, y });
            updateMeasurement();
            drawScene();
        });

        function updateMeasurement() {
            if (points.length === 1) {
                helperText.textContent = "Şimdi ikinci noktaya dokunun";
                resultText.textContent = "0.00 cm";
            } else if (points.length === 2) {
                const p1 = points[0];
                const p2 = points[1];

                // Matematiksel mesafe hesabı
                const pixelDist = Math.sqrt(Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2));
                const realDist = pixelDist * scaleFactor;
                
                resultText.textContent = `${realDist.toFixed(2)} cm`;
                helperText.textContent = "Yeni bir ölçüm için tekrar dokunabilirsiniz";
            }
        }

        // Çizim fonksiyonu
        function drawScene() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (points.length === 0) return;

            // 1. Nokta (Başlangıç)
            ctx.beginPath();
            ctx.arc(points[0].x, points[0].y, 8, 0, Math.PI * 2);
            ctx.fillStyle = '#007aff';
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.fill();
            ctx.stroke();

            if (points.length === 1) return;

            // 2. Nokta (Bitiş)
            ctx.beginPath();
            ctx.arc(points[1].x, points[1].y, 8, 0, Math.PI * 2);
            ctx.fillStyle = '#007aff';
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.fill();
            ctx.stroke();

            // İki nokta arasındaki çizgi
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            ctx.lineTo(points[1].x, points[1].y);
            ctx.strokeStyle = '#00ff66';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Çizginin üzerine mesafe etiketi yazma
            const midX = (points[0].x + points[1].x) / 2;
            const midY = (points[0].y + points[1].y) / 2;
            const pixelDist = Math.sqrt(Math.pow(points[1].x - points[0].x, 2) + Math.pow(points[1].y - points[0].y, 2));
            const realDist = pixelDist * scaleFactor;

            ctx.save();
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.font = 'bold 14px sans-serif';
            const text = `${realDist.toFixed(1)} cm`;
            const textWidth = ctx.measureText(text).width;
            
            // Yazı arkasına küçük siyah bir kutu (okunabilirliği artırmak için)
            ctx.fillRect(midX - (textWidth/2) - 6, midY - 12, textWidth + 12, 24);
            
            // Yazıyı yaz
            ctx.fillStyle = '#00ff66';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, midX, midY);
            ctx.restore();
        }
    </script>
</body>
</html>
