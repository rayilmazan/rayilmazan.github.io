<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akıllı Güvenlik Kamerası</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #080808;
            color: #ff3b30;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 1.1rem;
            letter-spacing: 2px;
            margin: 10px 0;
            text-align: center;
            color: #00ff66;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.3);
        }

        #container {
            position: relative;
            width: 90vw;
            max-width: 450px;
            aspect-ratio: 4/3;
            border: 2px solid #333;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            transform: scaleX(-1); /* Ayna efekti */
        }

        /* Alarm durumunda ekranı kırmızı flaş yaptırmak için */
        #alarmOverlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.3);
            z-index: 2;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s ease;
        }

        /* HUD Göstergeleri */
        .hud {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            z-index: 3;
            pointer-events: none;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            color: #00ff66;
            text-shadow: 1px 1px 2px #000;
        }

        .motion-bar-container {
            position: absolute;
            bottom: 15px;
            left: 15px;
            right: 15px;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            z-index: 3;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #motionBar {
            height: 100%;
            width: 0%;
            background: #ff3b30;
            transition: width 0.1s ease;
        }

        #statusText {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            font-size: 1.5rem;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #ff3b30;
            display: none;
            box-shadow: 0 0 20px rgba(255, 59, 48, 0.5);
            text-align: center;
        }

        /* Kontroller */
        .controls {
            width: 90vw;
            max-width: 450px;
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-sizing: border-box;
        }

        button {
            background: #111;
            border: 1px solid #00ff66;
            color: #00ff66;
            padding: 14px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 8px;
            font-size: 0.9rem;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        button:active {
            background: #00ff66;
            color: #000;
        }

        .slider-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            color: #aaa;
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
        }

        input[type="range"] {
            flex: 1;
            accent-color: #ff3b30;
        }
    </style>
</head>
<body>

    <h1>[ GÜVENLİK SİSTEMİ ACTIVE ]</h1>
    
    <div id="container">
        <video id="webcam" autoplay playsinline muted></video>
        <div id="alarmOverlay"></div>
        
        <div class="hud">
            <div>CAM: ACTIVE</div>
            <div id="motionPercent">HAREKET: 0.0%</div>
        </div>

        <div id="statusText">⚠️ HAREKET ALGILANDI!</div>

        <div class="motion-bar-container">
            <div id="motionBar"></div>
        </div>
    </div>

    <canvas id="analyseCanvas" style="display:none;"></canvas>

    <div class="controls">
        <button id="startBtn">Sistemi Başlat</button>
        <div class="slider-container">
            <span>Hassasiyet (Düşük = Daha Hassas):</span>
            <input type="range" id="sensitivitySlider" min="10" max="80" value="35">
            <span id="sensValue" style="color: #ff3b30; font-weight: bold;">35</span>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('analyseCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const startBtn = document.getElementById('startBtn');
        const alarmOverlay = document.getElementById('alarmOverlay');
        const statusText = document.getElementById('statusText');
        const motionBar = document.getElementById('motionBar');
        const motionPercent = document.getElementById('motionPercent');
        const sensitivitySlider = document.getElementById('sensitivitySlider');
        const sensValue = document.getElementById('sensValue');

        let stream = null;
        let animationId = null;
        let prevFrameData = null;
        let sensitivity = 35; // Piksel değişim eşiği
        let lastSoundTime = 0; // Sesin sürekli çalıp kasmaması için kontrol

        // Hassasiyet Sürgüsü
        sensitivitySlider.addEventListener('input', (e) => {
            sensitivity = parseInt(e.target.value);
            sensValue.textContent = sensitivity;
        });

        startBtn.addEventListener('click', async () => {
            if (stream) {
                stopCamera();
            } else {
                await startCamera();
            }
        });

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 320 }, height: { ideal: 240 } } 
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    // İşlemciyi yormamak için analizi 160x120 çözünürlüğünde yapıyoruz (Çok hızlı çalışır)
                    canvas.width = 160;
                    canvas.height = 120;
                    startBtn.textContent = "Sistemi Kapat";
                    startBtn.style.borderColor = "#ff3b30";
                    startBtn.style.color = "#ff3b30";
                    tick();
                };
            } catch (err) {
                alert("Kamera başlatılamadı. İzin verdiğinizden emin olun.");
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            if (animationId) cancelAnimationFrame(animationId);
            video.srcObject = null;
            startBtn.textContent = "Sistemi Başlat";
            startBtn.style.borderColor = "#00ff66";
            startBtn.style.color = "#00ff66";
            statusText.style.display = 'none';
            alarmOverlay.style.opacity = 0;
            motionBar.style.width = '0%';
            motionPercent.textContent = "HAREKET: 0.0%";
            prevFrameData = null;
        }

        // Web Audio API ile yapay alarm sesi üretme (Dışarıdan müzik yüklemeye gerek kalmaz)
        function playBeep() {
            const now = Date.now();
            if (now - lastSoundTime < 400) return; // 400ms'de bir en fazla 1 kez çal
            lastSoundTime = now;

            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.type = 'sawtooth'; // Keskin alarm sesi
            oscillator.frequency.setValueAtTime(950, audioCtx.currentTime); // Yüksek frekans
            gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime); // Ses şiddeti
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.15); // Kısa bir bip sesi
        }

        function tick() {
            if (!stream) return;

            // Kameradaki görüntüyü analiz tuvaline çiz
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const currentFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = currentFrame.data;

            if (prevFrameData) {
                let changedPixels = 0;
                const totalPixels = canvas.width * canvas.height;

                // Tüm pikselleri tek tek önceki kareyle karşılaştır
                for (let i = 0; i < data.length; i += 4) {
                    const rDiff = Math.abs(data[i] - prevFrameData[i]);
                    const gDiff = Math.abs(data[i+1] - prevFrameData[i+1]);
                    const bDiff = Math.abs(data[i+2] - prevFrameData[i+2]);
                    
                    // Eğer renk farkı hassasiyet eşiğinden büyükse hareket var demektir
                    if (rDiff + gDiff + bDiff > sensitivity * 3) {
                        changedPixels++;
                    }
                }

                // Değişen piksel yüzdesini hesapla
                const motionRatio = (changedPixels / totalPixels) * 100;
                motionPercent.textContent = `HAREKET: ${motionRatio.toFixed(1)}%`;
                motionBar.style.width = `${Math.min(motionRatio * 3, 100)}%`;

                // Eğer ekrandaki hareket %4'ün üzerindeyse alarmı tetikle
                if (motionRatio > 4.0) {
                    alarmOverlay.style.opacity = 1;
                    statusText.style.display = 'block';
                    playBeep();
                } else {
                    alarmOverlay.style.opacity = 0;
                    statusText.style.display = 'none';
                }
            }

            // Mevcut kareyi, bir sonraki kareyle karşılaştırmak üzere kaydet
            prevFrameData = data;

            animationId = requestAnimationFrame(tick);
        }
    </script>
</body>
</html>
