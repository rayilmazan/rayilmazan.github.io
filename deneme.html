<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiDAR 3D Point Cloud Tarayıcı</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.5);
        }

        #container {
            position: relative;
            width: 90vw;
            max-width: 640px;
            aspect-ratio: 4/3;
            border: 2px solid #00ff66;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
            border-radius: 8px;
            overflow: hidden;
        }

        video {
            display: none; /* Gerçek kamera görüntüsünü gizliyoruz, sadece işlenmiş kanvası göstereceğiz */
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            transform: scaleX(-1); /* Ayna efekti */
        }

        .overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 11px;
            text-shadow: 0 0 5px #000;
            pointer-events: none;
            line-height: 1.5;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        button {
            background: transparent;
            border: 1px solid #00ff66;
            color: #00ff66;
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background: #00ff66;
            color: #000;
            box-shadow: 0 0 10px #00ff66;
        }

        /* Ekrandaki sanal radar çizgileri */
        .grid-lines {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                linear-gradient(rgba(0, 255, 102, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 102, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
        }

        #status {
            margin-top: 10px;
            font-size: 12px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <h1>[LIDAR POINT CLOUD SCANNER]</h1>
    
    <div id="container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="scannerCanvas"></canvas>
        <div class="grid-lines"></div>
        <div class="overlay">
            <div>SYS.STATUS: ONLINE</div>
            <div id="fps">FPS: --</div>
            <div>LASER FREQ: 940nm (IR)</div>
            <div id="activeMode">MODE: GREEN RADAR</div>
        </div>
    </div>

    <div class="controls">
        <button id="startBtn">Kamerayı Başlat</button>
        <button id="toggleMode">Modu Değiştir</button>
    </div>
    <div id="status">Sistem başlatılmaya hazır. Kamera izni verin.</div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('scannerCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const toggleModeBtn = document.getElementById('toggleMode');
        const statusDiv = document.getElementById('status');
        const fpsDiv = document.getElementById('fps');
        const activeModeDiv = document.getElementById('activeMode');

        let stream = null;
        let animationFrameId = null;
        let currentMode = 'green'; // 'green' (LiDAR noktaları) veya 'thermal' (Isı haritası)
        let lastTime = performance.now();
        let frameCount = 0;

        startBtn.addEventListener('click', async () => {
            if (stream) {
                stopCamera();
            } else {
                await startCamera();
            }
        });

        toggleModeBtn.addEventListener('click', () => {
            currentMode = currentMode === 'green' ? 'thermal' : 'green';
            activeModeDiv.textContent = currentMode === 'green' ? "MODE: GREEN RADAR" : "MODE: DEPTH SCAN (HEAT)";
        });

        async function startCamera() {
            try {
                statusDiv.textContent = "Kamera erişimi isteniyor...";
                // facingMode: 'environment' arka kamerayı tercih etmesini sağlar
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } } 
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    statusDiv.textContent = "Sistem aktif. Tarama yapılıyor...";
                    startBtn.textContent = "Kamerayı Durdur";
                    tick();
                };
            } catch (err) {
                console.error("Kamera hatası:", err);
                statusDiv.textContent = "Hata: Kamera izni reddedildi veya kamera bulunamadı.";
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            statusDiv.textContent = "Sistem durduruldu.";
            startBtn.textContent = "Kamerayı Başlat";
            fpsDiv.textContent = "FPS: --";
        }

        function tick() {
            if (!stream) return;
            
            // FPS Sayacı
            frameCount++;
            const now = performance.now();
            if (now - lastTime >= 1000) {
                fpsDiv.textContent = `FPS: ${frameCount}`;
                frameCount = 0;
                lastTime = now;
            }

            // Kameradaki görüntüyü kanvasın belleğine çizip piksel analizi yapıyoruz
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            // Kanvası temizleyip arka planı koyulaştırıyoruz (Sci-fi görünümü için)
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Yoğunluk adımı: Ne kadar düşük olursa o kadar net ama yavaş çalışır (8-10 idealdir)
            const step = 8; 

            for (let y = 0; y < canvas.height; y += step) {
                for (let x = 0; x < canvas.width; x += step) {
                    // Piksellerin renk (RGB) değerlerini alıyoruz
                    const index = (y * canvas.width + x) * 4;
                    const r = data[index];
                    const g = data[index + 1];
                    const b = data[index + 2];
                    
                    // Parlaklık hesabı (Grayscale)
                    const brightness = (r + g + b) / 3;

                    // Işık yansımasını derinlik bilgisi gibi simüle ediyoruz
                    // Daha parlak noktalar "daha yakınmış" gibi daha büyük çizilecek
                    const size = (brightness / 255) * (step - 1.5) + 1;

                    ctx.beginPath();
                    
                    if (currentMode === 'green') {
                        // Klasik LiDAR yeşil nokta bulutu görünümü
                        ctx.fillStyle = `rgba(0, 255, 102, ${brightness / 255 + 0.15})`;
                    } else {
                        // Isı kamerası/Derinlik simülasyonu
                        // Parlaklık seviyesine göre Mavi -> Kırmızı -> Sarı -> Beyaz renk tayfı
                        let color;
                        if (brightness > 200) {
                            color = `rgba(255, 255, 255, 0.9)`; // Çok parlak / Çok yakın (Beyaz)
                        } else if (brightness > 140) {
                            color = `rgba(255, 50, 0, 0.8)`;   // Sıcak / Yakın (Kırmızı/Turuncu)
                        } else if (brightness > 70) {
                            color = `rgba(255, 215, 0, 0.7)`;  // Orta mesafe (Sarı/Yeşil)
                        } else {
                            color = `rgba(0, 50, 255, ${brightness / 100})`; // Soğuk / Uzak (Mavi)
                        }
                        ctx.fillStyle = color;
                    }
                    
                    ctx.arc(x, y, size / 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            animationFrameId = requestAnimationFrame(tick);
        }
    </script>
</body>
</html>
