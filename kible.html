<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kıble Uydu Görünümü</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { height: 100vh; width: 100vw; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Haritayı başlat ve tam ekran yap
        const map = L.map('map', { zoomControl: false }).setView([0, 0], 18);

        // 2. Uydu katmanını ekle (ESRI Satellite)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri'
        }).addTo(map);

        // Kabe Koordinatları
        const kabe = [21.4225, 39.8262];

        // 3. Konumu takip et
        navigator.geolocation.watchPosition((pos) => {
            const userPos = [pos.coords.latitude, pos.coords.longitude];
            
            map.setView(userPos, 19); // Uydu detayını artırmak için zoom 19

            // Kullanıcı işaretçisi ve Kıble çizgisi
            map.eachLayer((layer) => { if (layer instanceof L.Polyline || layer instanceof L.Marker) map.removeLayer(layer); });
            
            L.marker(userPos).addTo(map).bindPopup("Siz buradasınız").openPopup();
            
            // Kıble çizgisi (Kırmızı, 5px kalınlığında)
            L.polyline([userPos, kabe], { color: 'red', weight: 5, opacity: 0.8 }).addTo(map);
        });
    </script>
</body>
</html>
