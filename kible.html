<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kıble Bulucu (Pro)</title>
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css' rel='stylesheet' />
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        #indicator { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white; padding: 15px; border-radius: 10px; z-index: 1;
            font-family: sans-serif; text-align: center;
        }
    </style>
</head>
<body>

    <div id="indicator">Kıbleye yönelmek için haritayı döndürün...</div>
    <div id="map"></div>

    <script>
        // Tokenınızı buraya yapıştırın
        mapboxgl.accessToken = 'BURAYA_MAPBOX_TOKENINIZI_YAZIN';

        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/satellite-v9', // Uydu görüntüsü
            center: [35, 39],
            zoom: 18,
            pitch: 60 // 3D eğim
        });

        // Kullanıcı konumunu al ve haritayı güncelle
        navigator.geolocation.watchPosition((pos) => {
            const userPos = [pos.coords.longitude, pos.coords.latitude];
            
            // Haritayı kullanıcının konumuna odakla
            map.flyTo({ center: userPos, zoom: 19 });

            // Kabe'ye doğru çizgi ekle (Basit geometri)
            if (map.getSource('route')) {
                map.getSource('route').setData({
                    "type": "Feature",
                    "geometry": { "type": "LineString", "coordinates": [userPos, [39.8262, 21.4225]] }
                });
            } else {
                map.addSource('route', { 'type': 'geojson', 'data': {
                    "type": "Feature", "geometry": { "type": "LineString", "coordinates": [userPos, [39.8262, 21.4225]] }
                }});
                map.addLayer({
                    'id': 'route', 'type': 'line', 'source': 'route',
                    'layout': { 'line-join': 'round', 'line-cap': 'round' },
                    'paint': { 'line-color': '#ff0000', 'line-width': 8 }
                });
            }
        }, null, { enableHighAccuracy: true });

        // Cihazın yönünü dinle ve haritayı döndür
        window.addEventListener('deviceorientation', (event) => {
            let rotate = event.webkitCompassHeading || (360 - event.alpha);
            map.setBearing(rotate); // Haritayı pusula yönüne döndür
        }, true);
    </script>
</body>
</html>
