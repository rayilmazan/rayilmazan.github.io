<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kıble Pusulası</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #map { height: 100vh; width: 100vw; transition: transform 0.2s ease-out; }
        #overlay {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 15px; border-radius: 10px; z-index: 999;
            font-family: sans-serif; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="overlay">Cihazı döndürerek haritayı kıbleye hizalayın</div>
    <div id="map"></div>

    <script>
        // Haritayı başlat
        const map = L.map('map', { zoomControl: false }).setView([0, 0], 18);

        // Uydu görüntüsü katmanı (API anahtarı gerekmez)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Uydu Görüntüsü'
        }).addTo(map);

        let userMarker;

        // Konumu al
        navigator.geolocation.watchPosition((pos) => {
            const userPos = [pos.coords.latitude, pos.coords.longitude];
            if (!userMarker) {
                userMarker = L.marker(userPos).addTo(map);
            }
            userMarker.setLatLng(userPos);
            map.setView(userPos, 19);
        });

        // Cihaz dönüşünü (Pusula) dinle
        window.addEventListener('deviceorientation', (event) => {
            let rotate = event.webkitCompassHeading || (360 - event.alpha);
            // Haritayı döndür
            document.getElementById('map').style.transform = `rotate(${-rotate}deg)`;
        }, true);
    </script>
</body>
</html>
