<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayılmazan QR Dosya Gönderici</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f9; color: #333; }
        .box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input, button { padding: 12px; font-size: 16px; margin: 10px 0; width: 100%; box-sizing: border-box; border-radius: 6px; border: 1px solid #ccc; }
        button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:active { background: #0056b3; }
        #qrcode { margin-top: 20px; display: flex; justify-content: center; }
        .info { font-size: 14px; color: #666; margin-top: 10px; word-break: break-all; }
        .settings { font-size: 12px; color: #007bff; cursor: pointer; margin-top: 5px; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Rayılmazan Paylaşım</h2>
        <p>Dosyayı seç ve direkt QR üret:</p>
        
        <input type="file" id="dosyaSecici">
        <button onclick="qrUret()">QR Kod Üret</button>
        
        <div id="qrcode"></div>
        <div class="info" id="linkBilgi"></div>
        <div class="settings" onclick="ipSifirla()">IP Adresini Değiştir</div>
    </div>

    <script>
        function ipSifirla() {
            localStorage.removeItem('telefon_ip');
            alert("Kayıtlı IP silindi. Sonraki üretimde tekrar sorulacak.");
        }

        function qrUret() {
            const fileInput = document.getElementById('dosyaSecici');
            const qrContainer = document.getElementById('qrcode');
            const linkBilgi = document.getElementById('linkBilgi');
            
            qrContainer.innerHTML = "";
            linkBilgi.innerHTML = "";

            if (fileInput.files.length === 0) {
                alert("Lütfen önce bir dosya seçin!");
                return;
            }

            const file = fileInput.files[0];

            // IP adresini hafızadan (localStorage) kontrol et
            let yerelIP = localStorage.getItem('telefon_ip');

            if (!yerelIP) {
                yerelIP = prompt("Telefonun yerel ağ IP adresini gir (Örn: 192.168.1.25):", "192.168.1.");
                if (!yerelIP) return;
                localStorage.setItem('telefon_ip', yerelIP); // Bir daha sormamak için kaydet
            }

            // Dosya için geçici yerel link oluştur
            const dosyaLink = URL.createObjectURL(file);
            
            // Eğer telefonda arka planda bir HTTP sunucu çalışıyorsa link doğrudan indirilebilir olur.
            // Örnek: http://[IP]:8080/[dosya_adi] formatına dönüştürülebilir.
            linkBilgi.innerHTML = `Seçilen: <b>${file.name}</b><br><small>Hedef IP: ${yerelIP}</small>`;

            // QR Kodu oluştur
            new QRCode(qrContainer, {
                text: "http://" + yerelIP + "/" + file.name,
                width: 200,
                height: 200
            });
        }
    </script>

</body>
</html>
