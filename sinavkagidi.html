<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>rayılmazan | Sınav Editörü</title>
    <style>
        body { font-family: sans-serif; background: #222; color: #fff; padding: 20px; display: flex; gap: 20px; }
        
        /* Düzenleme Paneli */
        #panel { width: 300px; background: #333; padding: 15px; border-radius: 8px; }
        #panel input, #panel textarea { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        
        /* A4 Kağıdı */
        .a4-kagit { width: 210mm; min-height: 297mm; background: white; color: #000; padding: 15mm; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .header { border-bottom: 2px solid #000; margin-bottom: 20px; text-align: center; }
        .content { display: flex; gap: 20px; height: 600px; }
        .sutun { flex: 1; border: 1px dashed #ccc; padding: 10px; white-space: pre-wrap; }
        .footer { border-top: 2px solid #000; margin-top: 20px; padding-top: 10px; text-align: center; font-weight: bold; }

        @media print { #panel, button { display: none; } body { background: none; } .a4-kagit { box-shadow: none; } }
    </style>
</head>
<body>

    <div id="panel">
        <h3>Sınav Ayarları</h3>
        <input type="text" id="okulAdi" placeholder="Okul Adı" oninput="guncelle()">
        <input type="text" id="ogretmen" placeholder="Öğretmen Adı" oninput="guncelle()">
        <input type="text" id="sure" placeholder="Sınav Süresi" oninput="guncelle()">
        <textarea id="sorularA" placeholder="A Grubu Soruları" oninput="guncelle()" rows="5"></textarea>
        <textarea id="sorularB" placeholder="B Grubu Soruları" oninput="guncelle()" rows="5"></textarea>
        <button onclick="window.print()" style="width:100%; background:#28a745; color:white; border:none; padding:10px; cursor:pointer;">PDF/Yazdır</button>
    </div>

    <div class="a4-kagit">
        <div class="header">
            <h2 id="viewOkul">OKUL ADI</h2>
            <p>Ad Soyad: _______________ | Sınıf/No: ____/____ | Not: ____</p>
        </div>
        <div class="content">
            <div class="sutun" id="viewA"><h4>A Grubu</h4></div>
            <div class="sutun" id="viewB"><h4>B Grubu</h4></div>
        </div>
        <div class="footer">
            <p>Sınav Süresi: <span id="viewSure">__</span> | Başarılar Dilerim.</p>
            <p>Öğretmen: <span id="viewOgretmen">_______</span></p>
        </div>
    </div>

    <script>
        function guncelle() {
            document.getElementById('viewOkul').innerText = document.getElementById('okulAdi').value || 'OKUL ADI';
            document.getElementById('viewOgretmen').innerText = document.getElementById('ogretmen').value || '_______';
            document.getElementById('viewSure').innerText = document.getElementById('sure').value || '__';
            document.getElementById('viewA').innerHTML = '<h4>A Grubu</h4>' + document.getElementById('sorularA').value;
            document.getElementById('viewB').innerHTML = '<h4>B Grubu</h4>' + document.getElementById('sorularB').value;
        }
    </script>
</body>
</html>
