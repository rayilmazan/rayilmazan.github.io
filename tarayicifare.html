<!DOCTYPE html>
<html>
<head>
    <title>rayılmazan - Tarayıcı Kontrol</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #remote { width: 100%; height: 200px; border: 2px dashed #ccc; margin-top: 20px; }
    </style>
</head>
<body>
    <h3>rayılmazan - WebRTC Kontrol</h3>
    <div id="qrcode"></div>
    <div id="status">Bağlantı bekleniyor...</div>
    <div id="remote" onscroll="sendScroll(this.scrollTop)">İçerik Buraya</div>

    <script>
        const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        let dc;

        function start() {
            dc = pc.createDataChannel("control");
            dc.onmessage = (e) => { window.scrollTo(0, e.data); };
            pc.createOffer().then(offer => pc.setLocalDescription(offer));
            pc.onicecandidate = e => {
                if (!e.candidate) new QRCode("qrcode", btoa(JSON.stringify(pc.localDescription)));
            };
        }

        function sendScroll(val) { if(dc && dc.readyState === "open") dc.send(val); }
        
        // Eşleşme için QR okuma arayüzü eklenebilir
        start();
    </script>
</body>
</html>
