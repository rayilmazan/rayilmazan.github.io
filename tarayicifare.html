<!DOCTYPE html>
<html>
<head>
    <title>rayılmazan - QR Kontrol</title>
    <style>canvas { border: 1px solid #000; }</style>
</head>
<body>
    <h3>rayılmazan - Cihaz Eşleşme</h3>
    <canvas id="qrCanvas" width="200" height="200"></canvas>
    <p>Bağlantı için bu kodu diğer cihazda okutun.</p>

    <script>
        const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        let dc = pc.createDataChannel("rayılmazan");

        // QR Çizim Fonksiyonu (Basit bir görselleştirici)
        function drawQR(text) {
            const canvas = document.getElementById('qrCanvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = "black";
            // Not: Gerçek bir QR kütüphanesi karmaşıktır, 
            // burası veriyi görsel olarak "temsil eden" bir matris çizimidir.
            for(let i=0; i<text.length; i++) {
                ctx.fillRect((i*10)%200, Math.floor(i/20)*10, 8, 8);
            }
        }

        pc.onicecandidate = e => {
            if (!e.candidate) {
                const signal = btoa(JSON.stringify(pc.localDescription));
                drawQR(signal); // Veriyi QR görseli olarak çiz
            }
        };

        pc.createOffer().then(offer => pc.setLocalDescription(offer));

        window.onscroll = () => {
            if(dc && dc.readyState === "open") dc.send(window.scrollY);
        };
    </script>
</body>
</html>
