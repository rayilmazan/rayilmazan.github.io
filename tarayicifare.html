<!DOCTYPE html>
<html>
<head>
    <title>rayılmazan - Gerçek QR Eşleşme</title>
    <!-- Harici kütüphane, sadece internet olduğunda yüklenir -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <h3>rayılmazan - Eşleşme QR Kodu</h3>
    <div id="qrcode"></div>
    <p>Bu kodu telefonunuzun kamerasıyla okutarak bağlantı verisini alabilirsiniz.</p>

    <script>
        const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        let dc = pc.createDataChannel("rayılmazan");

        pc.onicecandidate = e => {
            if (!e.candidate) {
                // Bağlantı verisini base64 yapıp QR olarak basıyoruz
                const signal = btoa(JSON.stringify(pc.localDescription));
                new QRCode(document.getElementById("qrcode"), signal);
            }
        };

        pc.createOffer().then(offer => pc.setLocalDescription(offer));

        // Scroll hareketini diğer cihaza gönder
        window.onscroll = () => {
            if(dc && dc.readyState === "open") dc.send(window.scrollY);
        };
    </script>
</body>
</html>
