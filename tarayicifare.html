<!DOCTYPE html>
<html>
<head>
    <title>rayılmazan - Ağ Tarayıcı</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .active { color: green; font-weight: bold; }
        #results { margin-top: 20px; }
    </style>
</head>
<body>
    <h3>rayılmazan - Hızlı IP Tarayıcı</h3>
    <input type="text" id="subnet" value="192.168.1" placeholder="Örn: 192.168.1">
    <button onclick="scan()">Taramayı Başlat</button>
    <div id="results"></div>

    <script>
        async function scan() {
            const subnet = document.getElementById('subnet').value;
            const results = document.getElementById('results');
            results.innerHTML = "Taranıyor...";

            for (let i = 1; i < 255; i++) {
                const ip = `${subnet}.${i}`;
                // fetch ile kısa sürede yanıt almayı deneriz
                fetch(`http://${ip}`, { mode: 'no-cors', cache: 'no-cache' })
                    .then(() => {
                        const div = document.createElement('div');
                        div.className = "active";
                        div.innerText = "Aktif Cihaz: " + ip;
                        results.appendChild(div);
                    })
                    .catch(() => {}); // Pasifler yoksayılır
            }
        }
    </script>
</body>
</html>
