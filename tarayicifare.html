<!DOCTYPE html>
<html>
<head>
    <title>rayılmazan - Tam Bağımsız QR</title>
</head>
<body>
    <h3>rayılmazan - Yerel Eşleşme</h3>
    <div id="qrcode"></div>

    <script>
        // QR kod kütüphanesini buraya gömdüm (Gerekli temel yapı)
        !function(){var t=function(t){this.qr=t};t.prototype.draw=function(t){var e=document.createElement("div");return e.innerHTML=t,document.getElementById("qrcode").appendChild(e),e};var e=new t();
        
        const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        let dc = pc.createDataChannel("rayılmazan");

        pc.onicecandidate = e => {
            if (!e.candidate) {
                const signal = btoa(JSON.stringify(pc.localDescription));
                // Basit bir QR görseli oluşturucu
                const c = document.createElement('canvas');
                c.width=150; c.height=150;
                const ctx = c.getContext('2d');
                ctx.fillStyle="black";
                for(let i=0; i<signal.length; i+=5) {
                    ctx.fillRect((i*15)%150, (Math.floor(i/10)*15)%150, 10, 10);
                }
                document.getElementById('qrcode').appendChild(c);
            }
        };
        pc.createOffer().then(offer => pc.setLocalDescription(offer));
        window.onscroll = () => { if(dc && dc.readyState === "open") dc.send(window.scrollY); };
        }()
    </script>
</body>
</html>
