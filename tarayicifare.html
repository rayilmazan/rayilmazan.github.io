<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>rayılmazan - Tek Dosya</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; font-family: sans-serif; }
        #ekran { flex: 1; position: relative; background: #eee; border-bottom: 2px solid #999; }
        #touchpad { height: 35vh; background: #222; color: #fff; display: flex; align-items: center; justify-content: center; touch-action: none; }
        #imlec { position: absolute; width: 20px; height: 20px; background: red; border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); z-index: 10; }
    </style>
</head>
<body>

    <div id="ekran">
        <div id="imlec"></div>
        <h3 style="padding:10px;">rayılmazan Sanal İmleç Alanı</h3>
    </div>

    <div id="touchpad">
        <h2>Touchpad (Burada kaydır)</h2>
    </div>

    <script>
        const imlec = document.getElementById('imlec');
        const touchpad = document.getElementById('touchpad');
        let x = window.innerWidth / 2;
        let y = window.innerHeight / 4;
        let lastX, lastY;

        function guncelle() {
            imlec.style.left = x + 'px';
            imlec.style.top = y + 'px';
        }

        touchpad.addEventListener('touchstart', (e) => {
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
        });

        touchpad.addEventListener('touchmove', (e) => {
            e.preventDefault();
            let dx = e.touches[0].clientX - lastX;
            let dy = e.touches[0].clientY - lastY;
            x += dx * 1.5;
            y += dy * 1.5;
            guncelle();
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
        });

        guncelle();
    </script>
</body>
</html>
