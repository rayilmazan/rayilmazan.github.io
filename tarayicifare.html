<!DOCTYPE html>
<html>
<head>
    <title>rayılmazan - QR Eşleşme</title>
</head>
<body>
    <h3>rayılmazan - QR ile Eşleşme</h3>
    <div id="qr-area"></div>
    <div id="status">Bağlantı kuruluyor...</div>
    <input type="text" id="offerCode" placeholder="QR'dan gelen veriyi yapıştır">
    <button onclick="connect()">Bağlan</button>

    <script>
        const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        let dc;

        // QR Kod üretimi (Basit mantık: Veriyi ekrana yaz, kullanıcının cihazı okusun)
        pc.onicecandidate = e => {
            if (!e.candidate) {
                const data = btoa(JSON.stringify(pc.localDescription));
                document.getElementById('qr-area').innerHTML = "Bu veriyi diğer cihazda okutun/yapıştırın:<br><textarea>" + data + "</textarea>";
            }
        };

        dc = pc.createDataChannel("rayılmazan");
        dc.onmessage = (e) => { window.scrollTo(0, e.data); };

        async function connect() {
            const remoteDesc = JSON.parse(atob(document.getElementById('offerCode').value));
            await pc.setRemoteDescription(remoteDesc);
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
        }

        pc.createOffer().then(offer => pc.setLocalDescription(offer));

        window.onscroll = () => {
            if(dc && dc.readyState === "open") dc.send(window.scrollY);
        };
    </script>
</body>
</html>
