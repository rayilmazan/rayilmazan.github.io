<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yerel Ağ IP Çakışma ve ARP Analizörü - rayılmazan</title>
    <style>
        :root {
            --primary: #1e293b;
            --accent: #2563eb;
            --danger: #dc2626;
            --success: #16a34a;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #334155;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--card);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        hh1, h2 {
            color: var(--primary);
            margin-top: 0;
        }
        p {
            font-size: 0.95rem;
            color: #64748b;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85rem;
            box-sizing: border-box;
            resize: vertical;
        }
        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: 600;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        .results {
            margin-top: 24px;
        }
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-weight: 500;
        }
        .alert-danger {
            background-color: #fee2e2;
            color: var(--danger);
            border: 1px solid #fecaca;
        }
        .alert-success {
            background-color: #dcfce7;
            color: var(--success);
            border: 1px solid #bbf7d0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }
        th, td {
            text-align: left;
            padding: 10px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 0.9rem;
        }
        th {
            background-color: #f1f5f9;
            color: var(--primary);
        }
        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.8rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>IP Çakışma ve ARP Analizörü</h2>
    <p>Komut satırından aldığınız <strong>arp -a</strong> (Windows) veya <strong>arp -n</strong> (Linux/Pardus) çıktısını aşağıdaki alana yapıştırıp analiz edin.</p>
    
    <textarea id="arpInput" placeholder="Örnek Çıktı:
Internet Address      Physical Address      Type
192.168.1.1       aa-bb-cc-dd-ee-ff     dynamic
192.168.1.50      11-22-33-44-55-66     dynamic"></textarea>
    
    <button onclick="analyzeArp()">Analiz Et</button>

    <div class="results" id="resultsArea"></div>
</div>

<div class="footer">
    rayılmazan - Yerel Ağ Yönetim Aracı
</div>

<script>
function analyzeArp() {
    const input = document.getElementById('arpInput').value;
    const resultsArea = document.getElementById('resultsArea');
    resultsArea.innerHTML = '';

    if (!input.trim()) {
        resultsArea.innerHTML = '<div class="alert alert-danger">Lütfen geçerli bir ARP tablosu yapıştırın.</div>';
        return;
    }

    const lines = input.split('\n');
    const ipMap = new Map();
    let parsedCount = 0;

    // Regex to match IPv4 and MAC addresses
    const ipRegex = /\b(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\b/;
    const macRegex = /\b(?:[0-9A-Fa-f]{2}[:-]){5}[0-9A-Fa-f]{2}\b|\b(?:[0-9A-Fa-f]{4}\.){2}[0-9A-Fa-f]{4}\b/;

    lines.forEach(line => {
        const ipMatch = line.match(ipRegex);
        const macMatch = line.match(macRegex);

        if (ipMatch && macMatch) {
            const ip = ipMatch[0];
            const mac = macMatch[0].toLowerCase().replace(/\./g, '-');

            if (!ipMap.has(ip)) {
                ipMap.set(ip, new Set());
            }
            ipMap.get(ip).add(mac);
            parsedCount++;
        }
    });

    if (parsedCount === 0) {
        resultsArea.innerHTML = '<div class="alert alert-danger">Girilen metinde geçerli IP veya MAC adresi bulunamadı.</div>';
        return;
    }

    let conflictsFound = [];
    ipMap.forEach((macs, ip) => {
        if (macs.size > 1) {
            conflictsFound.push({ ip: ip, macs: Array.from(macs) });
        }
    });

    let html = '';
    if (conflictsFound.length > 0) {
        html += `<div class="alert alert-danger">⚠️ Dikkat! ${conflictsFound.length} adet IP çakışması tespit edildi! Aynı IP adresini kullanan farklı cihazlar mevcut.</div>`;
        html += '<table><tr><th>Çakışan IP Adresi</th><th>Tespit Edilen MAC Adresleri</th></tr>';
        conflictsFound.forEach(item => {
            html += `<tr><td><strong>${item.ip}</strong></td><td>${item.macs.join(', ')}</td></tr>`;
        });
        html += '</table>';
    } else {
        html += `<div class="alert alert-success">✓ Tarama tamamlandı. Analiz edilen ${parsedCount} kayıt arasında IP çakışmasına rastlanmadı.</div>`;
    }

    // Tüm listeyi tablo olarak göster
    html += '<h3 style="margin-top:24px; font-size:1.1rem; color:#1e293b;">Tespit Edilen Tüm Cihazlar</h3>';
    html += '<table><tr><th>IP Adresi</th><th>MAC Adresi</th></tr>';
    ipMap.forEach((macs, ip) => {
        macs.forEach(mac => {
            html += `<tr><td>${ip}</td><td>${mac}</td></tr>`;
        });
    });
    html += '</table>';

    resultsArea.innerHTML = html;
}
</script>

</body>
</html>
