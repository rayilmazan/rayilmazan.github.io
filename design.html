<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Vektör Dönüştürücü</title>
    <script src="https://cdn.jsdelivr.net/npm/potrace@2.1.8/potrace.min.js"></script>
</head>
<body>
    <h2>Görüntüden Vektöre Dönüştürücü</h2>
    <input type="file" id="upload" accept="image/*">
    <button id="convertBtn">Dönüştür ve İndir</button>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const upload = document.getElementById('upload');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        upload.addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        document.getElementById('convertBtn').addEventListener('click', () => {
            if (canvas.width === 0) return alert("Önce resim yükleyin!");

            const dataURL = canvas.toDataURL("image/png");
            const trace = new Potrace.Potrace();
            
            trace.loadImage(dataURL, () => {
                trace.process(() => {
                    const svg = trace.getSVG(1);
                    const blob = new Blob([svg], { type: 'image/svg+xml' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = 'cikti.svg';
                    link.click();
                });
            });
        });
    </script>
</body>
</html>
