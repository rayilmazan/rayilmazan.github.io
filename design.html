<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Pixel to Vector Converter</title>
    <script src="https://cdn.jsdelivr.net/npm/potrace@2.1.8/potrace.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #222; color: #eee; }
        .container { background: #333; padding: 20px; border-radius: 10px; margin-top: 20px; }
        #preview { border: 1px solid #555; max-width: 500px; display: block; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Görüntüden Vektöre (SVG)</h2>
        <input type="file" id="upload" accept="image/*">
        <br>
        <img id="preview" src="" alt="Önizleme">
        <button id="convertBtn">Vektöre Dönüştür ve İndir</button>
    </div>

    <script>
        const upload = document.getElementById('upload');
        const preview = document.getElementById('preview');
        const convertBtn = document.getElementById('convertBtn');

        upload.addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (event) => { preview.src = event.target.result; };
            reader.readAsDataURL(e.target.files[0]);
        });

        convertBtn.addEventListener('click', () => {
            if (!preview.src) return alert("Önce resim yükleyin!");

            // Potrace motorunu başlat
            const trace = new Potrace.Potrace();
            trace.loadImage(preview.src, () => {
                trace.process(() => {
                    const svg = trace.getSVG(1); // 1 = hassasiyet (1-10 arası)
                    
                    // İndirme işlemini tetikle
                    const blob = new Blob([svg], { type: 'image/svg+xml' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = 'vektor_cikti.svg';
                    link.click();
                });
            });
        });
    </script>
</body>
</html>
