
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>rayılmazan | Flashcard Sistemi</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .kart { width: 400px; height: 250px; background: #1e1e1e; border: 2px solid #ff9800; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 24px; text-align: center; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .kontroller { margin-top: 30px; display: flex; flex-direction: column; gap: 10px; width: 400px; }
        input { padding: 10px; border-radius: 4px; border: none; }
        button { padding: 10px; cursor: pointer; background: #ff9800; border: none; border-radius: 4px; font-weight: bold; }
        .info { margin-top: 20px; color: #888; font-size: 12px; }
    </style>
</head>
<body>

    <h2>Flashcard Sistemi</h2>
    <div class="kart" id="kart" onclick="cevir()">Başlamak için tıkla</div>
    
    <div class="kontroller">
        <input type="text" id="on" placeholder="Soru">
        <input type="text" id="arka" placeholder="Cevap">
        <button onclick="ekle()">Kartı Ekle</button>
        <button onclick="sonraki()" style="background:#444; color:#fff;">Sıradaki Kart</button>
    </div>

    <div class="info">Veriler tarayıcıda kalıcı olarak saklanır.</div>

    <script>
        // Veri yapısı: Tarayıcı hafızasından çek, yoksa varsayılanı yükle
        let kartlar = JSON.parse(localStorage.getItem('rayilmazan_flashcards')) || [{on: "Hoş geldin!", arka: "rayılmazan sistemine hazırsın."}];
        let index = 0;
        let onYuz = true;

        function guncelle() {
            document.getElementById('kart').innerText = onYuz ? kartlar[index].on : kartlar[index].arka;
        }

        function cevir() {
            onYuz = !onYuz;
            guncelle();
        }

        function ekle() {
            let on = document.getElementById('on').value;
            let arka = document.getElementById('arka').value;
            if(on && arka) {
                kartlar.push({on, arka});
                localStorage.setItem('rayilmazan_flashcards', JSON.stringify(kartlar));
                document.getElementById('on').value = '';
                document.getElementById('arka').value = '';
                alert("Kart kaydedildi!");
            }
        }

        function sonraki() {
            index = (index + 1) % kartlar.length;
            onYuz = true;
            guncelle();
        }

        guncelle();
    </script>
</body>
</html>
