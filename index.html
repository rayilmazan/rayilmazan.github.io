<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rayılmazan // Terminal</title>
    <style>
        body { background: #4e3629; color: #e0d7d3; font-family: 'Courier New', Courier, monospace; padding: 20px; display: flex; justify-content: center; margin: 0; }
        .chassis { max-width: 900px; width: 100%; background: #33241b; border: 2px solid #5a4234; padding: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        .header-section { display: flex; align-items: center; gap: 15px; border-bottom: 2px solid #4a3528; padding-bottom: 10px; margin-bottom: 20px; }
        .logo-tag { background: #4a3528; color: #00e676; padding: 4px 10px; font-weight: bold; border-left: 4px solid #00e676; }
        .content-container { display: grid; grid-template-columns: 1fr 220px; gap: 20px; }
        .main-log { background: #1a110d; border: 1px solid #291b15; padding: 20px; min-height: 390px; }
        .data-row { display: flex; justify-content: space-between; margin: 12px 0; border-bottom: 1px dashed #291b15; padding-bottom: 4px; }
        .side-bar { border-left: 1px solid #4a3528; padding-left: 20px; font-size: 11px; }
        
        /* Buton Stilleri */
        .greeble-btn { display: block; width: 100%; background: #2a1f18; color: #d1c4bc; border: 1px solid #7a5e4d; font-family: inherit; font-size: 11px; font-weight: bold; padding: 10px; margin-top: 10px; cursor: pointer; transition: all 0.2s; }
        .greeble-btn:hover { background: #4a3528; color: #ffffff; border-color: #00e676; box-shadow: 0 0 10px rgba(0, 230, 118, 0.4); }
        .highlight { color: #00e676; }
        .loading { color: #a8958b; padding: 40px 0; }
        
        @media (max-width: 768px) { .content-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="chassis">
    <div class="header-section">
        <div class="logo-tag">rayılmazan</div>
        <div class="tech-dials"><span>[system_online]</span></div>
    </div>

    <div class="content-container">
        <div class="main-log">
            <div id="view-device-info">
                <h2>> Sistem Bilgisi</h2>
                <div class="data-row"><span>Cihaz:</span> <span id="dev-type" class="highlight">Bekleniyor...</span></div>
                <div class="data-row"><span>OS:</span> <span id="dev-os" class="highlight">Bekleniyor...</span></div>
            </div>
        </div>
        <div class="side-bar">
            <button class="greeble-btn" onclick="alert('Sistem Aktif')">SİSTEMİ BAŞLAT</button>
            <button class="greeble-btn" onclick="location.reload()">YENİLE</button>
        </div>
    </div>
</div>

<script>
    // Sayfa yüklendiğinde çalışacak temel fonksiyon
    window.onload = function() {
        document.getElementById("dev-type").innerText = "Web Terminal V1";
        document.getElementById("dev-os").innerText = navigator.platform;
    };
</script>

</body>
</html>
