
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Rayılmazan - Yerel Ağ Dosya Terminali</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #1a1c1e; color: #e0e0e0; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; background: #25282c; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border-left: 5px solid #007bff; }
        h1 { margin-top: 0; font-size: 1.5rem; color: #ffffff; }
        .drop-zone { border: 2px dashed #444; padding: 40px; text-align: center; cursor: pointer; border-radius: 8px; transition: 0.3s; margin: 20px 0; }
        .drop-zone:hover { border-color: #007bff; background: #2d3136; }
        .info { font-size: 0.9rem; color: #888; margin-top: 10px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 1rem; }
        button:hover { background: #0056b3; }
        #fileList { margin-top: 20px; width: 100%; }
        .file-item { background: #333; padding: 10px; margin-bottom: 5px; border-radius: 4px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="container">
    <h1>Rayılmazan - Yerel Dosya Transferi</h1>
    <div class="drop-zone" id="dropZone">
        Dosyaları Sürükle veya Tıkla
        <input type="file" id="fileInput" multiple style="display: none;">
    </div>
    <div id="fileList"></div>
    <p class="info">Not: Dosyalar bu cihaz üzerinden yerel ağda (hotspot) anlık paylaşılır. Tarayıcıyı kapatmayın.</p>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFiles(e.target.files);

    function handleFiles(files) {
        for (let file of files) {
            const div = document.createElement('div');
            div.className = 'file-item';
            div.innerHTML = `<span>${file.name}</span> <span>${(file.size/1024/1024).toFixed(2)} MB</span>`;
            fileList.appendChild(div);
            // Burada P2P (WebRTC) veya yerel sunucu bağlantı mantığı kurgulanabilir
        }
    }
</script>
</body>
</html>
