<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayılmazan - Pardus Tahta Analiz Paneli</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; }
        h2 { text-align: center; color: #2c3e50; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 6px solid #ccc; }
        .card h3 { margin: 0 0 10px 0; font-size: 16px; color: #555; }
        .card .value { font-size: 22px; font-weight: bold; }
        
        .normal { border-left-color: #28a745; background: #e8f5e9; }
        .warning { border-left-color: #ffc107; background: #fffde7; }
        .danger { border-left-color: #dc3545; background: #ffebee; }
        
        .footer { text-align: center; margin-top: 25px; font-size: 12px; color: #777; }
        .btn { display: block; width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 20px; }
        .btn:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Rayılmazan Pardus Sağlık Paneli</h2>
        <p style="text-align: center; color: #666;">Tahtanın anlık donanım ve ağ durumu</p>

        <div class="grid">
            <div id="card-net" class="card">
                <h3>Ağ Durumu</h3>
                <div class="value" id="val-net">Yükleniyor...</div>
                <small id="val-ip">IP: -</small>
            </div>

            <div id="card-disk" class="card">
                <h3>Disk Doluluğu</h3>
                <div class="value" id="val-disk">Yükleniyor...</div>
                <small>Kök Dizin ( / )</small>
            </div>

            <div id="card-temp" class="card">
                <h3>İşlemci Sıcaklığı</h3>
                <div class="value" id="val-temp">Yükleniyor...</div>
                <small>Isı Durumu</small>
            </div>

            <div id="card-ram" class="card">
                <h3>RAM Tüketimi</h3>
                <div class="value" id="val-ram">Yükleniyor...</div>
                <small>Bellek Durumu</small>
            </div>
        </div>

        <button class="btn" onclick="verileriYukle()">Verileri Yenile</button>
        <div class="footer" id="son-guncelleme">Son Kontrol: -</div>
    </div>

    <script>
        function verileriYukle() {
            // Gerçek sistemde tahtadaki 'durum.json' dosyasını okur. 
            // Tek dosya kullanımında hata vermemesi için örnek veri yapısı simüle edilmiştir:
            const data = {
                "ip": "10.15.1.45",
                "net": "OK",
                "disk": "42",
                "temp": "48°C",
                "ram": "60"
            };

            // 1. Ağ Verisi
            const netCard = document.getElementById('card-net');
            document.getElementById('val-net').innerText = data.net === "OK" ? "Çevrimiçi" : "Kopuk";
            document.getElementById('val-ip').innerText = "IP: " + data.ip;
            netCard.className = "card " + (data.net === "OK" ? "normal" : "danger");

            // 2. Disk Verisi
            const diskCard = document.getElementById('card-disk');
            document.getElementById('val-disk').innerText = data.disk + "%";
            diskCard.className = "card " + (parseInt(data.disk) > 90 ? "danger" : parseInt(data.disk) > 75 ? "warning" : "normal");

            // 3. Sıcaklık Verisi
            const tempCard = document.getElementById('card-temp');
            document.getElementById('val-temp').innerText = data.temp;
            tempCard.className = "card " + (parseInt(data.temp) > 80 ? "danger" : parseInt(data.temp) > 70 ? "warning" : "normal");

            // 4. RAM Verisi
            document.getElementById('val-ram').innerText = data.ram + "%";
            document.getElementById('card-ram').className = "card " + (parseInt(data.ram) > 85 ? "warning" : "normal");

            document.getElementById('son-guncelleme').innerText = "Son Kontrol: " + new Date().toLocaleTimeString();
        }

        // Sayfa açıldığında çalıştır
        verileriYukle();
    </script>

</body>
</html>
