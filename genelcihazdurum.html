<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>rayılmazan | Sistem Takip</title>
    <style>
        :root { --bg: #050505; --card: #111; --green: #00ff00; }
        body { background: var(--bg); color: var(--green); font-family: monospace; padding: 20px; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 20px; border: 1px solid #333; cursor: pointer; border-left: 6px solid #555; }
        .card.online { border-left-color: var(--green); }
        .card.offline { border-left-color: #ff3e3e; }
    </style>
</head>
<body>
    <h2>SİSTEM TAKİP PANELİ</h2>
    <div id="dashboard" class="dashboard-grid"></div>

    <script>
        // Buraya kendi cihazlarını ekle
        const cihazlar = [
            { ad: "Tahta-1", ip: "192.168.1.10" },
            { ad: "Yazıcı-Lab", ip: "192.168.1.50" }
        ];

        function render() {
            const dash = document.getElementById('dashboard');
            dash.innerHTML = ''; // Temizle
            
            cihazlar.forEach(c => {
                const card = document.createElement('div');
                card.className = 'card'; // Başlangıçta nötr
                card.innerHTML = `<strong>${c.ad}</strong><br>${c.ip}<br><small>Kontrol ediliyor...</small>`;
                dash.appendChild(card);
            });
        }

        // Testi çalıştır
        async function kontrolEt() {
            render(); // Önce boş kartları çiz
            for(let c of cihazlar) {
                try {
                    // Timeout süresini kısalttık
                    const controller = new AbortController();
                    setTimeout(() => controller.abort(), 2000);
                    
                    await fetch('http://' + c.ip, { mode: 'no-cors', signal: controller.signal });
                    // Cevap gelirse yeşil yap
                    document.getElementById('dashboard').children[cihazlar.indexOf(c)].className = 'card online';
                    document.getElementById('dashboard').children[cihazlar.indexOf(c)].querySelector('small').innerText = "Aktif";
                } catch(e) {
                    // Hata alsa bile kırmızı yap (Cihazın var olduğunu ama yanıt vermediğini belirt)
                    document.getElementById('dashboard').children[cihazlar.indexOf(c)].className = 'card offline';
                    document.getElementById('dashboard').children[cihazlar.indexOf(c)].querySelector('small').innerText = "Yanıt Yok";
                }
            }
        }

        kontrolEt();
        setInterval(kontrolEt, 30000);
    </script>
</body>
</html>
