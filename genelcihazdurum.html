<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>rayılmazan | Dashboard</title>
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Courier New', monospace; padding: 20px; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { border: 1px solid #004400; padding: 15px; background: #0a0a0a; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: #00ff00; }
        .online { border-left: 5px solid #00ff00; }
        .offline { border-left: 5px solid #ff0000; }
        .modal { display: none; background: #111; padding: 20px; border: 1px solid #00ff00; position: fixed; top: 30%; left: 30%; width: 40%; z-index: 1000; }
        h2 { border-bottom: 2px solid #00ff00; display: inline-block; }
    </style>
</head>
<body>
    <h2>Sistem İzleme Paneli</h2>
    <div id="dashboard" class="dashboard-grid"></div>

    <div id="modal" class="modal">
        <h3 id="m-ad"></h3>
        <p id="m-log"></p>
        <button onclick="document.getElementById('modal').style.display='none'">Kapat</button>
    </div>

    <script>
        const cihazlar = [
            { ad: "Tahta-1", ip: "192.168.1.10", durum: "kontrol ediliyor", log: "Bekliyor..." },
            { ad: "Yazıcı-Lab", ip: "192.168.1.50", durum: "kontrol ediliyor", log: "Bekliyor..." }
        ];

        async function taramaYap() {
            for (let c of cihazlar) {
                try {
                    await fetch(`http://${c.ip}`, { mode: 'no-cors' });
                    c.durum = "online";
                    c.log = "Cihaz erişilebilir durumda.";
                } catch (e) {
                    c.durum = "offline";
                    c.log = "HATA: Cihaz yanıt vermiyor. Bağlantıyı kontrol edin.";
                }
            }
            render();
        }

        function render() {
            const dash = document.getElementById('dashboard');
            dash.innerHTML = '';
            cihazlar.forEach(c => {
                const card = document.createElement('div');
                card.className = `card ${c.durum === 'online' ? 'online' : 'offline'}`;
                card.innerHTML = `<strong>${c.ad}</strong><br><small>${c.ip}</small><br>Durum: ${c.durum}`;
                card.onclick = () => {
                    document.getElementById('m-ad').innerText = c.ad;
                    document.getElementById('m-log').innerText = c.log;
                    document.getElementById('modal').style.display = 'block';
                };
                dash.appendChild(card);
            });
        }

        taramaYap();
        setInterval(taramaYap, 30000);
    </script>
</body>
</html>
