<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Rayılmazan - Dijital Müfredat Asistanı</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; background: #ddd; }
        .tab-btn.active { background: #16a085; color: white; }
        .card { border-left: 5px solid #2c3e50; padding: 15px; background: #fff; margin-top: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .notebook { background: #fffde7; padding: 10px; border: 1px dashed #f39c12; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>RAYILMAZAN - Ders Planlayıcı</h1>
    <div id="tabs">
        <button class="tab-btn active" onclick="loadData('5sınıf')">5. Sınıflar</button>
        <button class="tab-btn" onclick="loadData('6sınıf')">6. Sınıflar</button>
    </div>

    <div id="display">
        <h2 id="sinif-adi">5. Sınıf</h2>
        <div class="card">
            <h3>Kazanım:</h3>
            <p id="kazanim">-</p>
            <h3>Deftere Yazılacaklar:</h3>
            <div class="notebook" id="defter">-</div>
            <br>
            <a href="https://drive.google.com/drive/folders/1EwXFoHf1GRmBwMlm-HfQGVggpuKYcRpQ" target="_blank">📂 Drive Materyallerini Aç</a>
        </div>
    </div>
</div>

<script>
    // Planlardan analiz edilen örnek veriler
    const planVerisi = {
        "5sınıf": { kazanim: "Bilişim Teknolojileri ve Yazılım dersi temel kavramları.", defter: "Konu: Bilişim Teknolojileri\n- Bilişim nedir?\n- Donanım ve Yazılım farkı." },
        "6sınıf": { kazanim: "Problem Çözme ve Programlama Mantığı.", defter: "Konu: Problem Çözme\n- Problem çözme adımları.\n- Algoritma nedir?" }
    };

    function loadData(sinif) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        
        document.getElementById('sinif-adi').innerText = sinif === '5sınıf' ? "5. Sınıf Planı" : "6. Sınıf Planı";
        document.getElementById('kazanim').innerText = planVerisi[sinif].kazanim;
        document.getElementById('defter').innerText = planVerisi[sinif].defter;
    }
</script>

</body>
</html>
